<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재무 의사결정지원 시스템 | GH 경기주택도시공사</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue:   #004a9c;
            --blue-2: #0091da;
            --blue-3: #eaf6fc;
            --ink:    #071421;
            --sans:   'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        html { background: #060f1c; }

        body {
            min-height: 100vh;
            font-family: var(--sans);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; text-decoration: none; }

        /* ── HEADER ───────────────────────────────── */
        .site-header {
            position: fixed;
            z-index: 50;
            top: 0; left: 0; right: 0;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(246, 249, 252, .88);
            box-shadow: 0 1px 0 rgba(226, 232, 240, .88), 0 12px 36px rgba(15, 23, 42, .06);
            backdrop-filter: blur(16px);
        }

        .nav {
            width: min(1200px, calc(100% - 48px));
            display: flex;
            align-items: center;
        }

        .brand img {
            width: 172px;
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 2px 12px rgba(0,74,156,.22));
        }

        /* ── HERO ─────────────────────────────────── */
        .hero {
            height: 100vh;
            min-height: 620px;
            position: relative;
            display: grid;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
            color: #fff;
        }

        /* BG images */
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: -3;
            background: url('gh-main-visual.jpg') center / cover no-repeat;
            animation: heroDrift 10s ease-in-out infinite alternate;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('gh-main-visual-2.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 3s infinite;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('gh-main-visual-3.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 6s infinite;
        }

        /* Overlay — left heavier for copy, right lighter for panel */
        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: -2;
            background:
                linear-gradient(180deg,
                    rgba(0, 30, 80, .36) 0%,
                    transparent 20%,
                    rgba(4, 10, 22, .52) 100%
                ),
                linear-gradient(108deg,
                    rgba(4, 10, 22, .82) 0%,
                    rgba(4, 10, 22, .60) 40%,
                    rgba(4, 10, 22, .28) 66%,
                    rgba(4, 10, 22, .38) 100%
                );
        }

        /* Subtle grid */
        .hero-grid {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(189,239,255,.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(189,239,255,.06) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
            background-size: 96px 96px, 96px 96px, 24px 24px, 24px 24px;
            mask-image:
                linear-gradient(90deg, transparent 0%, rgba(0,0,0,.55) 14%, rgba(0,0,0,.55) 82%, transparent 100%),
                linear-gradient(180deg, rgba(0,0,0,.4) 0%, rgba(0,0,0,.7) 50%, transparent 100%);
            mask-composite: intersect;
            opacity: .78;
            animation: gridDrift 16s linear infinite;
        }

        .hero-grid::before,
        .hero-grid::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .hero-grid::before {
            background:
                linear-gradient(90deg,
                    transparent 0%,
                    rgba(189,239,255,.02) 42%,
                    rgba(189,239,255,.18) 50%,
                    rgba(189,239,255,.02) 58%,
                    transparent 100%
                );
            transform: translateX(-62%);
            animation: scanAcross 5.8s ease-in-out infinite;
        }

        .hero-grid::after {
            background:
                linear-gradient(135deg,
                    transparent 0%,
                    transparent 46%,
                    rgba(0,145,218,.14) 50%,
                    transparent 54%,
                    transparent 100%
                );
            opacity: .55;
            transform: translate3d(-18%, -18%, 0);
            animation: diagonalSweep 7.2s ease-in-out infinite;
        }

        /* ── HERO INNER ───────────────────────────── */
        .hero-inner {
            width: min(1200px, calc(100% - 48px));
            margin: 0 auto;
            padding-top: 72px;
            display: grid;
            grid-template-columns: 1fr 340px;
            align-items: center;
            gap: clamp(48px, 6vw, 96px);
        }

        /* ── LEFT COPY ────────────────────────────── */
        .hero-copy { max-width: 620px; }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 26px;
            padding: 0 11px 0 7px;
            background: rgba(0, 145, 218, .13);
            border: 1px solid rgba(0, 145, 218, .28);
            border-radius: 999px;
            color: rgba(189, 239, 255, .88);
            font-size: 10.5px;
            font-weight: 750;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 22px;
            animation: riseIn .8s ease both;
        }

        .eyebrow-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--blue-2);
            box-shadow: 0 0 9px rgba(0,145,218,1);
            flex-shrink: 0;
        }

        .hero h1 {
            font-size: clamp(34px, 3.4vw, 58px);
            line-height: 1.14;
            letter-spacing: -.03em;
            font-weight: 850;
            text-wrap: balance;
            animation: riseIn .9s .07s ease both;
        }

        .hero h1 em {
            font-style: normal;
            color: #bdefff;
            text-shadow: 0 0 48px rgba(0,145,218,.28);
        }

        .hero-desc {
            margin-top: 20px;
            color: rgba(255,255,255,.68);
            font-size: clamp(14px, 1.35vw, 17px);
            line-height: 1.72;
            font-weight: 500;
            animation: riseIn .9s .16s ease both;
        }

        /* ── ENTRY PANEL ──────────────────────────── */
        .entry-panel {
            animation: riseIn .9s .24s ease both;
            position: relative;
        }

        .ep-card {
            position: relative;
            padding: 22px 24px 20px;
            background: rgba(5, 14, 28, .58);
            backdrop-filter: blur(36px);
            -webkit-backdrop-filter: blur(36px);
            border: 1px solid rgba(255,255,255,.11);
            border-radius: 20px;
            overflow: hidden;
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,.07),
                0 0 0 1px rgba(0,145,218,.08),
                0 28px 72px rgba(0,0,0,.54),
                0 4px 12px rgba(0,0,0,.28);
        }

        /* top sheen line */
        .ep-card::before {
            content: '';
            position: absolute;
            top: 0; left: 18%; right: 18%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(189,239,255,.32), transparent);
        }

        /* blue corner accent */
        .ep-card::after {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(0,145,218,.14) 0%, transparent 70%);
            pointer-events: none;
        }

        .ep-name {
            font-size: 20px;
            font-weight: 800;
            color: rgba(255,255,255,.95);
            line-height: 1.28;
            letter-spacing: -.025em;
            margin-bottom: 4px;
        }

        .ep-name-en {
            font-size: 10.5px;
            font-weight: 600;
            color: rgba(189,239,255,.42);
            letter-spacing: .04em;
            margin-bottom: 15px;
        }

        .ep-rule {
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,.09) 0%, rgba(255,255,255,.02) 100%);
            margin-bottom: 14px;
        }

        .ep-desc {
            font-size: 12.5px;
            color: rgba(196,220,248,.58);
            line-height: 1.72;
            font-weight: 500;
            margin-bottom: 18px;
        }

        /* CTA button */
        .ep-enter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 50px;
            padding: 0 13px 0 20px;
            background:
                linear-gradient(118deg, rgba(255,255,255,.075), rgba(255,255,255,.035)),
                rgba(6, 16, 30, .44);
            border: 1px solid rgba(189,239,255,.16);
            border-radius: 11px;
            color: rgba(238,247,255,.74);
            font-size: 13.5px;
            font-weight: 750;
            letter-spacing: -.01em;
            cursor: pointer;
            text-decoration: none;
            box-shadow:
                0 8px 22px rgba(0,0,0,.18),
                inset 0 1px 0 rgba(255,255,255,.08);
            opacity: .74;
            transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, color .22s ease, opacity .22s ease;
            margin-bottom: 14px;
        }

        .ep-enter:hover,
        .ep-enter:focus-visible {
            transform: translateY(-2px);
            background:
                linear-gradient(118deg, rgba(0,74,156,.92) 0%, rgba(0,145,218,.72) 100%),
                rgba(8, 28, 52, .72);
            border-color: rgba(189,239,255,.46);
            color: #fff;
            box-shadow:
                0 14px 36px rgba(0,145,218,.38),
                inset 0 1px 0 rgba(255,255,255,.14);
            opacity: 1;
            outline: none;
        }

        .ep-enter:active { transform: translateY(0); }

        .ep-arrow-wrap {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: rgba(255,255,255,.08);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: transform .22s ease, background .22s ease;
        }

        .ep-enter:hover .ep-arrow-wrap,
        .ep-enter:focus-visible .ep-arrow-wrap {
            transform: translateX(3px);
            background: rgba(255,255,255,.16);
        }

        /* ── ANIMATIONS ───────────────────────────── */
        @keyframes heroDrift {
            from { transform: scale(1.05) translate3d(0,0,0); }
            to   { transform: scale(1.12) translate3d(-1.4%, .8%, 0); }
        }

        @keyframes imgCross {
            0%, 28%  { opacity: 0; }
            34%, 60% { opacity: 1; }
            66%, 100% { opacity: 0; }
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(63,246,200,.7); }
            60%  { box-shadow: 0 0 0 8px rgba(63,246,200,0); }
            100% { box-shadow: 0 0 0 0 rgba(63,246,200,0); }
        }

        @keyframes gridDrift {
            from { background-position: 0 0, 0 0, 0 0, 0 0; }
            to { background-position: 96px 96px, 96px 96px, 24px 24px, 24px 24px; }
        }

        @keyframes scanAcross {
            0%, 12% { transform: translateX(-68%); opacity: 0; }
            28%, 62% { opacity: .72; }
            88%, 100% { transform: translateX(68%); opacity: 0; }
        }

        @keyframes diagonalSweep {
            0%, 18% { transform: translate3d(-26%, -26%, 0); opacity: 0; }
            44%, 70% { opacity: .5; }
            100% { transform: translate3d(26%, 26%, 0); opacity: 0; }
        }

        /* ── RESPONSIVE ───────────────────────────── */
        @media (max-width: 920px) {
            .hero-inner {
                grid-template-columns: 1fr;
                gap: 28px;
                align-items: start;
                padding-top: 100px;
            }
            .entry-panel { width: min(340px, 100%); }
        }

        @media (max-width: 600px) {
            .brand img { width: 148px; }
            .hero-inner { width: calc(100% - 32px); padding-top: 92px; }
            .hero h1 { font-size: 30px; }
            .entry-panel { width: 100%; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .001ms !important;
            }
        }
    </style>
</head>

<body>

    <header class="site-header">
        <nav class="nav" aria-label="주요 메뉴">
            <a class="brand" href="#">
                <img src="gh-header-logo.png" alt="GH 경기주택도시공사" width="172" height="44">
            </a>
        </nav>
    </header>

    <main>
        <section class="hero" aria-labelledby="heroTitle">
            <div class="hero-bg" id="heroBg"></div>
            <div class="hero-overlay"></div>
            <div class="hero-grid"></div>

            <div class="hero-inner">

                <!-- LEFT: Copy -->
                <div class="hero-copy">
                    <div class="eyebrow" aria-label="Financial Decision Support System">
                        <span class="eyebrow-dot" aria-hidden="true"></span>
                        Financial Decision Support System
                    </div>
                    <h1 id="heroTitle">
                        대한민국 도시주택의<br>
                        <em>미래를 만들어가는</em> GH
                    </h1>
                    <p class="hero-desc">재무 의사결정지원 시스템</p>
                </div>

                <!-- RIGHT: Entry Panel -->
                <aside class="entry-panel" aria-label="시스템 입장">
                    <div class="ep-card">

                        <h2 class="ep-name">재무 의사결정<br>지원 시스템</h2>
                        <p class="ep-name-en">Financial Decision Support System</p>

                        <div class="ep-rule"></div>

                        <p class="ep-desc">
                            GH의 재무 데이터를 기반으로 한<br>
                            통합 의사결정 지원 플랫폼
                        </p>

                        <a class="ep-enter" href="index.html">
                            <span>시스템 입장하기</span>
                            <span class="ep-arrow-wrap" aria-hidden="true">
                                <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                                    <path d="M2 7H12M8 3L12 7L8 11"
                                          stroke="currentColor"
                                          stroke-width="1.6"
                                          stroke-linecap="round"
                                          stroke-linejoin="round"/>
                                </svg>
                            </span>
                        </a>

                    </div>
                </aside>

            </div>
        </section>
    </main>

    <script>
        const heroBg = document.getElementById('heroBg');
        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            heroBg.style.transform =
                `scale(${1.05 + Math.min(y, 600) / 9000}) translate3d(0, ${y * .03}px, 0)`;
        }, { passive: true });
    </script>

</body>
</html>
