<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재무 의사결정지원 시스템 | GH Landing</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue: #004a9c;
            --blue-2: #0091da;
            --blue-3: #eaf6fc;
            --ink: #071421;
            --ink-2: #253449;
            --muted: #68778d;
            --line: rgba(226, 232, 240, .9);
            --white: #fff;
            --shadow: 0 24px 70px rgba(7, 20, 33, .14);
            --sans: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif;
        }

        html {
            scroll-behavior: smooth;
            background: #f6f9fc;
        }

        body {
            min-height: 100vh;
            color: var(--ink);
            font-family: var(--sans);
            overflow-x: hidden;
            overflow-y: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font: inherit;
        }

        .page {
            position: relative;
            min-height: 100vh;
            background: #f6f9fc;
        }

        .site-header {
            position: fixed;
            z-index: 50;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(246, 249, 252, .92);
            box-shadow: 0 1px 0 rgba(226, 232, 240, .9), 0 12px 36px rgba(15, 23, 42, .06);
            backdrop-filter: blur(18px);
            transition: background .35s ease, box-shadow .35s ease, height .35s ease;
        }

        .site-header.scrolled {
            height: 64px;
            background: rgba(255, 255, 255, .9);
            box-shadow: 0 1px 0 rgba(226, 232, 240, .9), 0 14px 40px rgba(15, 23, 42, .08);
            backdrop-filter: blur(18px);
        }

        .nav {
            width: min(1180px, calc(100% - 40px));
            display: flex;
            align-items: center;
            gap: 34px;
            justify-content: space-between;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 250px;
        }

        .brand img {
            width: 180px;
            height: 44px;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 8px 16px rgba(0, 74, 156, .12));
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 26px;
            margin-left: auto;
            color: rgba(255, 255, 255, .86);
            font-size: 14px;
            font-weight: 650;
            transition: color .35s ease;
        }

        .site-header.scrolled .nav-links {
            color: var(--ink-2);
        }

        .nav-link {
            position: relative;
            padding: 8px 0;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background: var(--blue-2);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform .25s ease;
        }

        .nav-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .nav-cta {
            border: 1px solid rgba(0, 74, 156, .18);
            color: var(--blue);
            background: var(--blue-3);
            backdrop-filter: blur(14px);
            height: 40px;
            padding: 0 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 850;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform .25s ease, background .25s ease, border-color .25s ease, color .25s ease;
        }

        .site-header.scrolled .nav-cta {
            color: var(--blue);
            border-color: rgba(0, 74, 156, .18);
            background: var(--blue-3);
        }

        .nav-cta:hover {
            transform: translateY(-2px);
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        .hero {
            min-height: 100vh;
            height: 100vh;
            position: relative;
            display: grid;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
            color: #fff;
        }

        .hero-bg,
        .hero-bg::before,
        .hero-bg::after {
            position: absolute;
            inset: 0;
            z-index: -3;
        }

        .hero-bg::before,
        .hero-bg::after {
            content: '';
            background-size: cover;
            background-position: center;
            animation: imageFade 9s infinite;
        }

        .hero-bg {
            background-image: url('gh-main-visual.jpg');
            background-size: cover;
            background-position: center;
            transform: scale(1.06);
            animation: heroScale 9s ease-in-out infinite alternate;
        }

        .hero-bg::before {
            background-image: url('gh-main-visual-2.png');
            opacity: 0;
            animation-delay: 3s;
        }

        .hero-bg::after {
            background-image: url('gh-main-visual-3.png');
            opacity: 0;
            animation-delay: 6s;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -2;
            background:
                linear-gradient(90deg, rgba(3, 14, 26, .72) 0%, rgba(3, 14, 26, .38) 47%, rgba(3, 14, 26, .54) 100%),
                linear-gradient(180deg, rgba(0, 74, 156, .34) 0%, rgba(0, 0, 0, .12) 44%, rgba(3, 14, 26, .65) 100%);
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255, 255, 255, .065) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .055) 1px, transparent 1px);
            background-size: 72px 72px;
            mask-image: linear-gradient(90deg, transparent 0%, #000 18%, #000 78%, transparent 100%);
            opacity: .55;
        }

        .hero-inner {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            padding-top: 72px;
            position: relative;
            text-align: left;
            display: grid;
            grid-template-columns: minmax(0, 700px) minmax(320px, 360px);
            align-items: center;
            gap: clamp(56px, 7vw, 116px);
        }

        .hero-copy {
            width: 100%;
            margin: 0;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, .86);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0;
            text-transform: uppercase;
            margin-bottom: 22px;
            animation: fadeUp .8s ease both;
        }

        .eyebrow::before {
            content: '';
            width: 42px;
            height: 2px;
            background: var(--blue-2);
            box-shadow: 0 0 22px rgba(0, 145, 218, .8);
        }

        .eyebrow::after {
            content: '';
            display: none;
        }

        .hero h1 {
            font-size: clamp(40px, 3.8vw, 64px);
            line-height: 1.12;
            letter-spacing: 0;
            font-weight: 850;
            text-wrap: balance;
            animation: fadeUp .9s .08s ease both;
        }

        .hero h1 span {
            color: #bdefff;
            text-shadow: 0 0 36px rgba(0, 145, 218, .36);
        }

        .hero-desc {
            margin-top: 24px;
            width: min(640px, 100%);
            margin-left: 0;
            margin-right: 0;
            color: rgba(255, 255, 255, .82);
            font-size: clamp(22px, 2.1vw, 30px);
            line-height: 1.75;
            font-weight: 850;
            letter-spacing: 0;
            animation: fadeUp .9s .18s ease both;
        }

        .hero-actions {
            justify-content: flex-start;
            margin-top: 30px;
        }

        .btn-primary {
            min-width: 226px;
            justify-content: center;
        }

        .hero-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            width: min(720px, 100%);
            margin-top: 34px;
            flex-wrap: wrap;
            animation: fadeUp .9s .28s ease both;
        }

        .hero-enter {
            position: relative;
            min-width: 168px;
            height: 50px;
            border: 1px solid rgba(189, 239, 255, .46);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            color: #fff;
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(16px);
            font-size: 14px;
            font-weight: 850;
            letter-spacing: 0;
            text-decoration: none;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .2), 0 20px 44px rgba(0, 0, 0, .18);
            transition: transform .25s ease, border-color .25s ease, background .25s ease, color .25s ease;
        }

        .hero-enter::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--blue-2);
            box-shadow: 0 0 18px rgba(0, 145, 218, .8);
        }

        .hero-enter::after {
            content: '';
            width: 8px;
            height: 8px;
            border-top: 2px solid currentColor;
            border-right: 2px solid currentColor;
            transform: rotate(45deg);
            transition: transform .25s ease;
        }

        .hero-enter:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, .72);
            background: rgba(0, 145, 218, .28);
        }

        .hero-enter:hover::after {
            transform: translateX(4px) rotate(45deg);
        }

        .entry-panel {
            position: relative;
            width: min(360px, 100%);
            justify-self: end;
            animation: fadeUp .9s .3s ease both;
        }

        .entry-row {
            position: relative;
            min-height: 62px;
            border: 1px solid rgba(177, 207, 235, .22);
            border-radius: 8px;
            display: grid;
            grid-template-columns: 40px minmax(0, 1fr) auto;
            align-items: center;
            gap: 10px;
            padding: 10px 14px 10px 10px;
            color: rgba(221, 235, 248, .88);
            text-decoration: none;
            background: rgba(4, 12, 24, .42);
            transition: transform .24s ease, border-color .24s ease, background .24s ease;
        }

        .entry-row + .entry-row {
            margin-top: 8px;
        }

        .entry-row-active {
            border-color: rgba(189, 239, 255, .66);
            background:
                linear-gradient(100deg, rgba(0, 74, 156, .58), rgba(0, 145, 218, .24)),
                rgba(17, 32, 59, .72);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .2), 0 24px 58px rgba(0, 0, 0, .32);
        }

        .entry-row:hover {
            transform: translateY(-2px);
            border-color: rgba(189, 239, 255, .72);
            background: rgba(0, 145, 218, .22);
        }

        .entry-code {
            width: 30px;
            height: 30px;
            border: 1px solid rgba(177, 207, 235, .34);
            border-radius: 7px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #cde9ff;
            font-size: 11px;
            font-weight: 800;
        }

        .entry-row strong {
            display: block;
            color: #eef7ff;
            font-size: 13px;
            line-height: 1.15;
            font-weight: 850;
            letter-spacing: 0;
            text-transform: uppercase;
        }

        .entry-row small {
            display: block;
            margin-top: 4px;
            color: rgba(177, 207, 235, .58);
            font-size: 11px;
            line-height: 1.2;
            font-weight: 650;
        }

        .entry-row em {
            color: #cde9ff;
            font-size: 11px;
            font-style: normal;
            font-weight: 800;
        }

        .btn {
            height: 52px;
            border-radius: 999px;
            border: 1px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 0 22px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .25s ease, box-shadow .25s ease, background .25s ease, border-color .25s ease;
        }

        .btn-primary {
            background: #fff;
            color: var(--blue);
            box-shadow: 0 18px 45px rgba(255, 255, 255, .18);
        }

        .btn-ghost {
            color: #fff;
            border-color: rgba(255, 255, 255, .38);
            background: rgba(255, 255, 255, .1);
            backdrop-filter: blur(14px);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 52px rgba(0, 74, 156, .24);
        }

        .hero-panel {
            position: absolute;
            right: 0;
            bottom: -110px;
            width: min(480px, 42vw);
            min-height: 260px;
            padding: 22px;
            border: 1px solid rgba(255, 255, 255, .28);
            border-radius: 28px;
            background: rgba(255, 255, 255, .13);
            backdrop-filter: blur(22px);
            box-shadow: 0 28px 80px rgba(0, 0, 0, .2);
            animation: floatPanel 7s ease-in-out infinite, fadeUp .9s .38s ease both;
        }

        .panel-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
            color: rgba(255, 255, 255, .86);
            font-size: 13px;
            font-weight: 800;
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 999px;
            background: #3ff6c8;
            box-shadow: 0 0 0 0 rgba(63, 246, 200, .68);
            animation: pulse 1.8s infinite;
        }

        .metric-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 18px;
        }

        .metric {
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, .16);
            border: 1px solid rgba(255, 255, 255, .18);
        }

        .metric b {
            display: block;
            font-size: 24px;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        .metric span {
            display: block;
            margin-top: 8px;
            color: rgba(255, 255, 255, .72);
            font-size: 12px;
            font-weight: 650;
        }

        .signal {
            display: grid;
            gap: 10px;
        }

        .signal-line {
            height: 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, .18);
            overflow: hidden;
        }

        .signal-line i {
            display: block;
            height: 100%;
            width: var(--w);
            border-radius: inherit;
            background: linear-gradient(90deg, #76dcff, #fff);
            animation: loadBar 2.2s ease both;
        }

        .scroll-cue {
            position: absolute;
            left: 50%;
            bottom: 28px;
            transform: translateX(-50%);
            display: grid;
            justify-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, .7);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .scroll-cue::after {
            content: '';
            width: 1px;
            height: 46px;
            background: linear-gradient(#fff, transparent);
            animation: scrollLine 1.7s ease-in-out infinite;
        }

        .blue-band {
            position: relative;
            z-index: 3;
            width: min(1180px, calc(100% - 40px));
            margin: -72px auto 0;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            box-shadow: var(--shadow);
            border-radius: 6px;
            overflow: hidden;
        }

        .band-item {
            min-height: 104px;
            padding: 24px 26px;
            background: var(--blue);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            position: relative;
            overflow: hidden;
        }

        .band-item:nth-child(2) {
            background: #047bc2;
        }

        .band-item:nth-child(3) {
            background: #073f88;
        }

        .band-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, .18) 45%, transparent 62%);
            transform: translateX(-120%);
            animation: sheen 4.8s infinite;
        }

        .band-kicker {
            color: rgba(255, 255, 255, .72);
            font-size: 12px;
            font-weight: 750;
            margin-bottom: 5px;
        }

        .band-title {
            font-size: 18px;
            font-weight: 850;
        }

        .band-icon {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: rgba(255, 255, 255, .18);
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .section {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            padding: 130px 0 0;
        }

        .section-head {
            display: grid;
            grid-template-columns: minmax(0, .85fr) minmax(280px, .55fr);
            gap: 64px;
            align-items: end;
            margin-bottom: 42px;
        }

        .section-kicker {
            color: var(--blue);
            font-size: 13px;
            font-weight: 850;
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .section h2 {
            font-size: clamp(32px, 4vw, 56px);
            line-height: 1.08;
            letter-spacing: -0.035em;
            font-weight: 850;
        }

        .section p {
            color: var(--muted);
            font-size: 16px;
            line-height: 1.8;
            font-weight: 500;
        }

        .reveal {
            opacity: 0;
            transform: translateY(34px);
            transition: opacity .8s ease, transform .8s cubic-bezier(.2, .75, .24, 1);
        }

        .reveal.show {
            opacity: 1;
            transform: translateY(0);
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
        }

        .feature {
            min-height: 290px;
            padding: 28px;
            border: 1px solid var(--line);
            border-radius: 26px;
            background: rgba(255, 255, 255, .78);
            backdrop-filter: blur(18px);
            box-shadow: 0 14px 44px rgba(15, 23, 42, .05);
            position: relative;
            overflow: hidden;
            transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
        }

        .feature:hover {
            transform: translateY(-8px);
            box-shadow: 0 24px 60px rgba(0, 74, 156, .14);
            border-color: rgba(0, 145, 218, .36);
        }

        .feature::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--blue), var(--blue-2));
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .35s ease;
        }

        .feature:hover::before {
            transform: scaleX(1);
        }

        .feature-number {
            font-size: 13px;
            font-weight: 850;
            color: var(--blue-2);
            margin-bottom: 28px;
        }

        .feature h3 {
            font-size: 22px;
            line-height: 1.25;
            letter-spacing: -0.02em;
            margin-bottom: 14px;
        }

        .feature p {
            font-size: 14px;
            line-height: 1.75;
        }

        .feature-icon {
            position: absolute;
            right: 22px;
            bottom: 22px;
            width: 74px;
            height: 74px;
            border-radius: 24px;
            background: var(--blue-3);
            color: var(--blue);
            display: grid;
            place-items: center;
        }

        .flow {
            display: grid;
            grid-template-columns: .82fr 1.18fr;
            gap: 24px;
            align-items: stretch;
        }

        .map-panel {
            min-height: 520px;
            border-radius: 34px;
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow);
            background-image: url('gh-main-visual-2.png');
            background-size: cover;
            background-position: center;
        }

        .map-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(180deg, rgba(0, 74, 156, .06), rgba(0, 74, 156, .72)),
                linear-gradient(90deg, rgba(0, 0, 0, .2), rgba(0, 0, 0, .04));
        }

        .map-label {
            position: absolute;
            left: 26px;
            right: 26px;
            bottom: 26px;
            color: #fff;
        }

        .map-label b {
            display: block;
            font-size: 30px;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .timeline {
            border: 1px solid var(--line);
            border-radius: 34px;
            background: #fff;
            padding: 26px;
            box-shadow: 0 18px 60px rgba(15, 23, 42, .06);
        }

        .step {
            display: grid;
            grid-template-columns: 58px 1fr;
            gap: 18px;
            padding: 24px 0;
            position: relative;
        }

        .step + .step {
            border-top: 1px solid var(--line);
        }

        .step-no {
            width: 50px;
            height: 50px;
            border-radius: 18px;
            background: var(--blue-3);
            color: var(--blue);
            display: grid;
            place-items: center;
            font-weight: 850;
        }

        .step h3 {
            font-size: 21px;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .step p {
            font-size: 15px;
        }

        .insight {
            margin-top: 130px;
            padding: 92px 0;
            background:
                linear-gradient(135deg, #071421 0%, #073f88 60%, #005daa 100%);
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .insight::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .06) 1px, transparent 1px);
            background-size: 68px 68px;
            mask-image: radial-gradient(circle at 50% 45%, #000 0%, transparent 76%);
        }

        .insight-inner {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            position: relative;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-top: 42px;
        }

        .stat {
            padding: 30px 24px;
            border-radius: 26px;
            border: 1px solid rgba(255, 255, 255, .14);
            background: rgba(255, 255, 255, .08);
            backdrop-filter: blur(16px);
        }

        .stat strong {
            font-size: 44px;
            line-height: 1;
            letter-spacing: -0.04em;
            display: block;
        }

        .stat span {
            margin-top: 12px;
            display: block;
            color: rgba(255, 255, 255, .72);
            font-weight: 650;
        }

        .cta-section {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            padding: 120px 0;
        }

        .cta-box {
            min-height: 360px;
            border-radius: 38px;
            overflow: hidden;
            position: relative;
            display: grid;
            align-items: center;
            padding: 58px;
            color: #fff;
            background-image: url('gh-main-visual-3.png');
            background-size: cover;
            background-position: center;
            box-shadow: var(--shadow);
        }

        .cta-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(3, 14, 26, .82), rgba(3, 14, 26, .28));
        }

        .cta-content {
            position: relative;
            width: min(660px, 100%);
        }

        .cta-content h2 {
            font-size: clamp(32px, 4.5vw, 58px);
            line-height: 1.08;
            letter-spacing: -0.035em;
            margin-bottom: 20px;
        }

        .cta-content p {
            color: rgba(255, 255, 255, .78);
            font-size: 17px;
            line-height: 1.75;
            margin-bottom: 28px;
        }

        .footer {
            border-top: 1px solid var(--line);
            background: #fff;
            padding: 34px 0;
        }

        .footer-inner {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 600;
        }

        .footer img {
            width: 154px;
            height: auto;
        }

        @keyframes heroScale {
            from { transform: scale(1.06) translate3d(0, 0, 0); }
            to { transform: scale(1.12) translate3d(-1.5%, 1%, 0); }
        }

        @keyframes imageFade {
            0%, 28% { opacity: 0; }
            34%, 60% { opacity: 1; }
            66%, 100% { opacity: 0; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatPanel {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-16px); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(63, 246, 200, .68); }
            70% { box-shadow: 0 0 0 12px rgba(63, 246, 200, 0); }
            100% { box-shadow: 0 0 0 0 rgba(63, 246, 200, 0); }
        }

        @keyframes loadBar {
            from { width: 0; }
            to { width: var(--w); }
        }

        @keyframes scrollLine {
            0% { transform: scaleY(0); transform-origin: top; opacity: .2; }
            45% { transform: scaleY(1); opacity: 1; }
            100% { transform: scaleY(0); transform-origin: bottom; opacity: .2; }
        }

        @keyframes sheen {
            0%, 55% { transform: translateX(-120%); }
            85%, 100% { transform: translateX(120%); }
        }

        @keyframes lineFlow {
            0%, 100% { transform: translateX(-24%) scaleX(.72); opacity: .72; }
            50% { transform: translateX(42%) scaleX(1); opacity: 1; }
        }

        @media (max-width: 1020px) {
            .nav-links {
                display: none;
            }

            .hero-inner {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .entry-panel {
                width: min(360px, 100%);
                min-height: auto;
            }

            .hero-panel {
                position: relative;
                right: auto;
                bottom: auto;
                width: 100%;
                margin-top: 42px;
            }

            .blue-band,
            .section-head,
            .flow,
            .stat-grid {
                grid-template-columns: 1fr;
            }

            .feature-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 680px) {
            .site-header {
                height: 64px;
            }

            .nav {
                width: calc(100% - 28px);
            }

            .brand img {
                width: 154px;
            }

            .hero {
                min-height: auto;
                padding: 120px 0 92px;
            }

            .hero-inner,
            .section,
            .insight-inner,
            .cta-section,
            .footer-inner {
                width: calc(100% - 28px);
            }

            .hero-inner {
                padding-top: 90px;
            }

            .hero h1 {
                font-size: 34px;
            }

            .hero-desc {
                font-size: 22px;
            }

            .entry-panel {
                min-height: auto;
                padding: 0;
                justify-self: stretch;
            }

            .metric-row,
            .blue-band,
            .feature-grid {
                grid-template-columns: 1fr;
            }

            .section {
                padding-top: 86px;
            }

            .map-panel {
                min-height: 360px;
            }

            .cta-box {
                padding: 34px 24px;
                border-radius: 28px;
            }

            .footer-inner {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: .001ms !important;
                animation-iteration-count: 1 !important;
                scroll-behavior: auto !important;
                transition-duration: .001ms !important;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header class="site-header" id="siteHeader">
            <nav class="nav" aria-label="주요 메뉴">
                <a class="brand" href="#">
                    <img src="gh-header-logo.png" alt="GH 경기주택도시공사">
                </a>
            </nav>
        </header>

        <main>
            <section class="hero" aria-labelledby="heroTitle">
                <div class="hero-bg" id="heroBg"></div>
                <div class="hero-inner">
                    <div class="hero-copy">
                        <div class="eyebrow">Financial Decision Support System</div>
                        <h1 id="heroTitle">대한민국 도시주택의<br><span>미래를 만들어가는</span> GH</h1>
                        <p class="hero-desc">재무 의사결정지원 시스템</p>
                    </div>
                    <aside class="entry-panel" aria-label="재무 의사결정지원 시스템 입장">
                        <a class="entry-row entry-row-active" href="index.html">
                            <span class="entry-code">ENT</span>
                            <span>
                                <strong>재무 의사결정지원 시스템</strong>
                                <small>Financial Decision Support System</small>
                            </span>
                            <em>ENTER</em>
                        </a>
                    </aside>
                </div>
            </section>
        </main>
    </div>

    <script>
        const header = document.getElementById('siteHeader');
        const heroBg = document.getElementById('heroBg');

        window.addEventListener('scroll', () => {
            const y = window.scrollY;
            header.classList.toggle('scrolled', y > 24);
            heroBg.style.transform = `scale(${1.06 + Math.min(y, 600) / 9000}) translate3d(0, ${y * .035}px, 0)`;
        }, { passive: true });
    </script>
</body>

</html>
