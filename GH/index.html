<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재무 의사결정지원 시스템 | GH</title>
    <!-- Fonts & React & Babel & XLSX & Supabase & ChartJS (Local Offline) -->
    <link rel="stylesheet" href="lib/fonts.css">
    <script src="lib/react.production.min.js"></script>
    <script src="lib/react-dom.production.min.js"></script>
    <script src="lib/babel.min.js"></script>
    <script src="lib/xlsx.bundle.js"></script>
    <script src="lib/supabase.js"></script>
    <script src="lib/chart.umd.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            /* surfaces */
            --bg: #f6f7f9;
            --panel: #ffffff;
            --panel-2: #fafbfc;
            --hover: #f1f3f6;

            /* borders */
            --border: #e6e8ec;
            --border2: #d8dbe1;
            --border3: #bfc4cd;

            /* text */
            --text: #0f172a;
            --text2: #334155;
            --text3: #64748b;
            --text4: #94a3b8;

            /* brand */
            --acc: #004a9c;
            --acc-h: #003875;
            --acc-lt: #eaf6fc;
            --acc-soft: #d8eef9;

            /* semantics */
            --red: #dc2626;
            --red-lt: #fef2f2;
            --green: #16a34a;
            --green-lt: #f0fdf4;
            --orange: #ea580c;
            --orange-lt: #fff7ed;
            --teal: #0091da;
            --purple: #9333ea;
            --amber: #d97706;

            /* legacy aliases used by chart code */
            --hdr: #0f172a;
            --nav: #0f172a;
            --nav-act: #004a9c;

            /* type */
            --sans: 'Pretendard Variable', Pretendard, 'Inter', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif;
            --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

            /* radii / shadow */
            --r-sm: 6px;
            --r: 8px;
            --r-lg: 12px;
            --shadow-1: 0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 1px rgba(15, 23, 42, 0.03);
            --shadow-2: 0 4px 12px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);
            --shadow-pop: 0 24px 60px rgba(15, 23, 42, 0.18);
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 13px;
            line-height: 1.5;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        button, input, select, textarea {
            font-family: inherit;
        }

        .shell {
            display: flex;
            height: 100vh;
            background: var(--bg);
        }

        /* ============== 로그인 화면 ============== */
        .login-bg {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 18% 22%, rgba(0, 145, 218, 0.20) 0%, transparent 55%),
                radial-gradient(circle at 82% 78%, rgba(0, 74, 156, 0.14) 0%, transparent 55%),
                #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            font-family: var(--sans);
        }

        .login-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(circle at center, black 25%, transparent 75%);
            pointer-events: none;
        }

        .login-card {
            background: #fff;
            border-radius: 14px;
            padding: 0;
            width: 400px;
            box-shadow: 0 20px 60px rgba(2, 6, 23, 0.45), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
            border: 1px solid rgba(226, 232, 240, 0.4);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .login-head {
            padding: 32px 32px 22px;
        }

        .login-mark {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .login-mark-dot {
            width: 128px;
            height: 32px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .login-mark-dot img {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .login-mark-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            letter-spacing: 0.02em;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1.2;
        }

        .login-sub {
            font-size: 13px;
            color: var(--text3);
            margin-top: 6px;
        }

        .login-body {
            padding: 8px 32px 28px;
        }

        .login-field {
            margin-bottom: 14px;
        }

        .login-lbl {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 6px;
        }

        .login-inp {
            width: 100%;
            padding: 11px 12px;
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            font-size: 13px;
            background: #fff;
            color: var(--text);
            transition: border-color .15s, box-shadow .15s;
        }

        .login-inp::placeholder {
            color: var(--text4);
        }

        .login-inp:focus {
            outline: none;
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-soft);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--text);
            color: #fff;
            border: none;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background .15s, transform .05s;
        }

        .login-btn:hover {
            background: #1e293b;
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .login-err {
            background: var(--red-lt);
            border: 1px solid #fecaca;
            color: var(--red);
            padding: 10px 12px;
            font-size: 12px;
            border-radius: var(--r-sm);
            margin-bottom: 12px;
        }

        .login-footer {
            padding: 14px 32px;
            background: var(--panel-2);
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text4);
            text-align: center;
            letter-spacing: 0.02em;
        }

        /* ============== 사이드바 ============== */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: #ffffff;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sb-brand {
            padding: 18px 18px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, #ffffff 0%, #f8fbfd 100%);
        }

        .sb-mark {
            width: 164px;
            height: 40px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .sb-mark img {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .sb-brand-name {
            font-size: 14px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: 0;
            line-height: 1.25;
            white-space: nowrap;
        }

        .sb-brand-sub {
            font-size: 10.75px;
            color: var(--text3);
            margin-top: 1px;
            white-space: nowrap;
        }

        .sb-nav {
            padding: 14px 10px;
            overflow-y: auto;
            flex: 1;
        }

        .sb-grp {
            font-size: 10.5px;
            font-weight: 600;
            color: var(--text4);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 12px 10px 6px;
        }

        .sb-grp:first-child {
            padding-top: 4px;
        }

        .sb-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text2);
            cursor: pointer;
            border-radius: var(--r-sm);
            transition: background .12s, color .12s;
            margin-bottom: 1px;
            font-weight: 500;
        }

        .sb-item:hover {
            background: var(--hover);
            color: var(--text);
        }

        .sb-item.active {
            background: var(--acc-lt);
            color: var(--acc);
            font-weight: 600;
        }

        .sb-icon {
            width: 16px;
            height: 16px;
            stroke-width: 1.75;
            flex-shrink: 0;
            opacity: 0.85;
        }

        .sb-item.active .sb-icon {
            opacity: 1;
        }

        .sb-foot {
            border-top: 1px solid var(--border);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sb-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #94a3b8, #475569);
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .sb-user-meta {
            flex: 1;
            min-width: 0;
            line-height: 1.25;
        }

        .sb-user-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sb-user-status {
            font-size: 10.5px;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .sb-user-status::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 2px rgba(22, 163, 74, 0.18);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--text3);
            font-size: 11px;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all .15s;
        }

        .logout-btn:hover {
            background: var(--red-lt);
            border-color: #fecaca;
            color: var(--red);
        }

        /* ============== 메인 영역 ============== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        /* 톱바 (페이지 헤더) */
        .topbar {
            height: 60px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 16px;
            flex-shrink: 0;
        }

        .tb-title {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
            min-width: 0;
        }

        .tb-eyebrow {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .tb-pagename {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
            margin-top: 2px;
        }

        .tb-meta {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .tb-stat {
            font-size: 11.5px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tb-stat b {
            color: var(--text);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .tb-stat-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.15);
        }

        /* 툴바 */
        .toolbar {
            min-height: 52px;
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 8px 24px;
            gap: 10px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .tb-sec {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tb-sec + .tb-sec {
            padding-left: 12px;
            border-left: 1px solid var(--border);
            margin-left: 2px;
        }

        .tb-lbl {
            color: var(--text3);
            font-size: 11.5px;
            white-space: nowrap;
            font-weight: 500;
        }

        .tb-lbl b {
            color: var(--text);
            font-weight: 700;
        }

        .popt-inp {
            padding: 7px 10px;
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            min-width: 220px;
            font-size: 12.5px;
            background: #fff;
            color: var(--text);
            transition: border-color .15s, box-shadow .15s;
        }

        .popt-inp:focus {
            outline: none;
            border-color: var(--acc);
            box-shadow: 0 0 0 3px var(--acc-soft);
        }

        .tbtn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 12px;
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            background: #fff;
            color: var(--text2);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            height: 32px;
            transition: all .12s;
        }

        .tbtn:hover {
            border-color: var(--border3);
            background: var(--panel-2);
            color: var(--text);
        }

        .tbtn.pri {
            background: var(--text);
            color: #fff;
            border-color: var(--text);
        }

        .tbtn.pri:hover {
            background: #1e293b;
            border-color: #1e293b;
            color: #fff;
        }

        .tbtn.acc {
            background: var(--acc);
            color: #fff;
            border-color: var(--acc);
        }

        .tbtn.acc:hover {
            background: var(--acc-h);
            border-color: var(--acc-h);
            color: #fff;
        }

        .tbtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .tbtn.danger {
            border-color: #fecaca;
            color: var(--red);
            background: #fff;
        }

        .tbtn.danger:hover {
            background: var(--red-lt);
            border-color: #fca5a5;
            color: var(--red);
        }

        /* 탭바 */
        .tabbar {
            background: #fff;
            border-bottom: 1px solid var(--border);
            display: flex;
            padding: 0 24px;
            gap: 4px;
            flex-shrink: 0;
        }

        .tab {
            padding: 11px 14px 12px;
            font-size: 12.5px;
            color: var(--text3);
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: color .12s, border-color .12s;
            font-weight: 500;
            margin-bottom: -1px;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--acc);
            font-weight: 600;
            border-bottom-color: var(--acc);
        }

        /* 뷰 헤더 (단위 선택 등) */
        .view-hd {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px 4px;
            flex-shrink: 0;
        }

        .vt {
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .vmeta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vmeta span {
            font-size: 11.5px;
            color: var(--text3);
        }

        .vmeta .popt-inp {
            min-width: 120px;
            height: 28px;
            padding: 4px 8px;
            font-size: 12px;
        }

        /* 뷰 본문 */
        .vbody {
            flex: 1;
            overflow: auto;
            padding: 14px 24px 24px;
            background: var(--bg);
        }

        /* KPI 카드 */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 14px;
        }

        .scard {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            overflow: hidden;
            transition: box-shadow .15s, transform .15s;
        }

        .scard:hover {
            box-shadow: var(--shadow-2);
        }

        .scard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--border2);
        }

        .scard.b::before { background: var(--acc); }
        .scard.t::before { background: var(--teal); }
        .scard.g::before { background: var(--green); }
        .scard.o::before { background: var(--orange); }
        .scard.p::before { background: var(--purple); }

        .sl {
            font-size: 11.5px;
            color: var(--text3);
            font-weight: 500;
            letter-spacing: 0.01em;
        }

        .sv {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
            line-height: 1.15;
            font-variant-numeric: tabular-nums;
        }

        .su {
            font-size: 12px;
            color: var(--text3);
            font-weight: 500;
            margin-left: 4px;
        }

        .ss {
            font-size: 11px;
            color: var(--text4);
            margin-top: 1px;
        }

        /* 패널 */
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: var(--r-lg);
            margin-bottom: 14px;
            overflow: hidden;
        }

        .phd {
            min-height: 44px;
            padding: 12px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
        }

        .pt {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.005em;
        }

        .pt::before {
            content: '';
            width: 3px;
            height: 14px;
            background: var(--acc);
            border-radius: 2px;
            display: inline-block;
        }

        .pb {
            padding: 18px;
        }

        .pb0 {
            padding: 0;
        }

        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 14px;
        }

        /* 데이터 그리드 */
        .grid-wrap {
            overflow: auto;
        }

        .dgrid {
            width: 100%;
            border-collapse: collapse;
            font-size: 12.5px;
            white-space: nowrap;
        }

        .dgrid thead tr {
            background: var(--panel-2);
        }

        .dgrid th {
            padding: 10px 14px;
            text-align: right;
            font-weight: 600;
            color: var(--text3);
            font-size: 11px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            background: var(--panel-2);
            position: sticky;
            top: 0;
            z-index: 5;
            white-space: nowrap;
        }

        .dgrid th:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            z-index: 10;
            background: var(--panel-2);
            min-width: 200px;
        }

        .dgrid td {
            padding: 11px 14px;
            text-align: right;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-variant-numeric: tabular-nums;
            background: #fff;
        }

        .dgrid td.center {
            text-align: center;
        }

        .dgrid td:first-child {
            text-align: left;
            position: sticky;
            left: 0;
            z-index: 4;
            background: #fff;
            color: var(--text);
            font-weight: 500;
        }

        .dgrid tbody tr:hover td {
            background: var(--panel-2) !important;
        }

        .dgrid tbody tr:last-child td {
            border-bottom: none;
        }

        .dgrid .sub td {
            background: var(--panel-2) !important;
            font-weight: 600;
            color: var(--text2);
        }

        .dgrid .tot td {
            background: var(--acc-lt) !important;
            font-weight: 700;
            color: var(--text);
            border-top: 1px solid var(--acc-soft);
        }

        .dgrid .tot td:first-child {
            color: var(--acc);
            background: var(--acc-lt) !important;
        }

        .neg {
            color: var(--red) !important;
            font-variant-numeric: tabular-nums;
        }

        .dash {
            color: var(--text4) !important;
        }

        .pos {
            color: var(--green) !important;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* 카테고리 칩 */
        .chip {
            display: inline-flex;
            align-items: center;
            padding: 2px 9px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            background: var(--panel-2);
            color: var(--text2);
            border: 1px solid var(--border);
            letter-spacing: 0.01em;
        }

        .chip.택지 { background: var(--acc-lt); color: var(--acc); border-color: var(--acc-soft); }
        .chip.산단 { background: #ecfeff; color: var(--teal); border-color: #cffafe; }
        .chip.주택 { background: var(--green-lt); color: var(--green); border-color: #bbf7d0; }
        .chip.기타 { background: var(--panel-2); color: var(--text3); border-color: var(--border); }

        /* 프로젝트관리 스타일 */

            margin-top: 6px;
        }

        .year-btn {
            background: #fff;
            border: 1.5px solid var(--border2);
            border-radius: var(--r);
            padding: 14px 12px;
            font-size: 13.5px;
            font-weight: 650;
            color: var(--text2);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            position: relative;
            overflow: hidden;
        }

        .year-btn:hover {
            border-color: var(--border3);
            background: var(--panel-2);
            transform: translateY(-1px);
            box-shadow: var(--shadow-1);
        }

        .year-btn.active {
            border-color: var(--acc);
            background: var(--acc-lt);
            color: var(--acc);
            box-shadow: 0 0 0 1px var(--acc-soft);
        }

        .year-btn.active::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 11px;
            font-weight: 900;
            color: var(--acc);
        }

        .year-btn-sub {
            font-size: 10px;
            font-weight: 500;
            color: var(--text3);
        }

        .year-btn.active .year-btn-sub {
            color: var(--acc);
            opacity: 0.85;
        }

        .segmented-control {
            display: flex;
            background: var(--panel-2);
            border: 1px solid var(--border2);
            border-radius: var(--r-sm);
            padding: 3px;
            gap: 2px;
            margin-top: 6px;
        }

        .seg-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text3);
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .seg-btn:hover {
            color: var(--text);
            background: rgba(15, 23, 42, 0.03);
        }

        .seg-btn.active {
            background: #fff;
            color: var(--text);
            font-weight: 700;
            box-shadow: var(--shadow-1);
        }

        .sql-box {
            background: #0f172a;
            border-radius: var(--r);
            border: 1px solid #1e293b;
            margin-top: 10px;
            overflow: hidden;
        }

        .sql-header {
            background: #1e293b;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #94a3b8;
            font-size: 11px;
            font-family: var(--sans);
            font-weight: 600;
            border-bottom: 1px solid #334155;
        }

        .sql-content {
            padding: 14px;
            color: #e2e8f0;
            font-family: var(--mono);
            font-size: 11px;
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-x: auto;
            max-height: 180px;
            margin: 0;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #e2e8f0;
            padding: 4px 8px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.12s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }

        /* Tree view styling */
        .tree-container {
            padding: 10px;
            font-size: 13px;
            color: var(--text2);
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .tree-node {
            display: flex;
            flex-direction: column;
            margin-left: 14px;
            position: relative;
        }
        .tree-node-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: var(--r-sm);
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .tree-node-header:hover {
            background-color: var(--hover);
        }
        .tree-node-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            flex-shrink: 0;
        }
        .tree-node-label {
            font-weight: 550;
            color: var(--text);
        }
        .tree-node-count {
            font-size: 11px;
            color: var(--text4);
            font-weight: 400;
        }

        /* Project list table style */
        .proj-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: left;
        }
        .proj-table th {
            padding: 8px 10px;
            background: var(--panel-2);
            border-bottom: 1px solid var(--border);
            color: var(--text3);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .proj-table td {
            padding: 9px 10px;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            vertical-align: middle;
        }
        .proj-table tbody tr:hover td {
            background: var(--hover);
        }
        .proj-table tbody tr:last-child td {
            border-bottom: none;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 6px;
            font-size: 10.5px;
            font-weight: 600;
            border-radius: 4px;
            line-height: 1.2;
        }
        .badge.success {
            background-color: var(--green-lt);
            color: var(--green);
            border: 1px solid rgba(22, 163, 74, 0.25);
        }
        .badge.empty {
            background-color: #f1f5f9;
            color: #94a3b8;
            border: 1px solid #e2e8f0;
        }
        .tree-node-children {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-top: 2px;
        }
        .tree-leaf {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
            margin-left: 24px;
            border-radius: var(--r-sm);
            transition: background-color 0.15s ease;
            gap: 12px;
        }
        .tree-leaf:hover {
            background-color: var(--hover);
        }
        .tree-leaf-info {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
            flex: 1;
        }
        .tree-leaf-label {
            font-weight: 600;
            color: var(--acc);
            white-space: nowrap;
        }
        .tree-leaf-desc {
            font-size: 11px;
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
        }
        .tree-leaf-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .tree-leaf:hover .tree-leaf-actions {
            opacity: 1;
        }
        .tree-chevron {
            width: 14px;
            height: 14px;
            transition: transform 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text3);
        }
        .tree-chevron.open {
            transform: rotate(90deg);
        }

        /* Modal dialog style */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-box {
            background: #fff;
            border-radius: var(--r-lg);
            width: 440px;
            max-width: 90%;
            box-shadow: var(--shadow-pop);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalFadeIn 0.2s ease-out;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-head {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 18px;
            color: var(--text3);
            cursor: pointer;
            line-height: 1;
        }
        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .modal-foot {
            padding: 12px 20px;
            background: var(--panel-2);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
    </style>
</head>

<body>
        <div id="landing-host"></div>
    <template id="landing-template">
        <style>

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --blue:   #004a9c;
            --blue-2: #0091da;
            --blue-3: #eaf6fc;
            --ink:    #071421;
            --sans:   'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        html { background: #060f1c; }

        body {
            min-height: 100vh;
            font-family: var(--sans);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; text-decoration: none; }

        /* ── HEADER ───────────────────────────────── */
        .site-header {
            position: fixed;
            z-index: 50;
            top: 0; left: 0; right: 0;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(246, 249, 252, .88);
            box-shadow: 0 1px 0 rgba(226, 232, 240, .88), 0 12px 36px rgba(15, 23, 42, .06);
            backdrop-filter: blur(16px);
        }

        .nav {
            width: min(1200px, calc(100% - 48px));
            display: flex;
            align-items: center;
        }

        .brand img {
            width: 172px;
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 2px 12px rgba(0,74,156,.22));
        }

        /* ── HERO ─────────────────────────────────── */
        .hero {
            height: 100vh;
            min-height: 620px;
            position: relative;
            display: grid;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
            color: #fff;
        }

        /* BG images */
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: -3;
            background: url('assets/gh-main-visual.jpg') center / cover no-repeat;
            animation: heroDrift 10s ease-in-out infinite alternate;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/gh-main-visual-2.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 3s infinite;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/gh-main-visual-3.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 6s infinite;
        }

        /* Overlay — left heavier for copy, right lighter for panel */
        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: -2;
            background:
                linear-gradient(180deg,
                    rgba(0, 30, 80, .36) 0%,
                    transparent 20%,
                    rgba(4, 10, 22, .52) 100%
                ),
                linear-gradient(108deg,
                    rgba(4, 10, 22, .82) 0%,
                    rgba(4, 10, 22, .60) 40%,
                    rgba(4, 10, 22, .28) 66%,
                    rgba(4, 10, 22, .38) 100%
                );
        }

        /* Subtle grid */
        .hero-grid {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(189,239,255,.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(189,239,255,.06) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
            background-size: 96px 96px, 96px 96px, 24px 24px, 24px 24px;
            mask-image:
                linear-gradient(90deg, transparent 0%, rgba(0,0,0,.55) 14%, rgba(0,0,0,.55) 82%, transparent 100%),
                linear-gradient(180deg, rgba(0,0,0,.4) 0%, rgba(0,0,0,.7) 50%, transparent 100%);
            mask-composite: intersect;
            opacity: .78;
            animation: gridDrift 16s linear infinite;
        }

        .hero-grid::before,
        .hero-grid::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .hero-grid::before {
            background:
                linear-gradient(90deg,
                    transparent 0%,
                    rgba(189,239,255,.02) 42%,
                    rgba(189,239,255,.18) 50%,
                    rgba(189,239,255,.02) 58%,
                    transparent 100%
                );
            transform: translateX(-62%);
            animation: scanAcross 5.8s ease-in-out infinite;
        }

        .hero-grid::after {
            background:
                linear-gradient(135deg,
                    transparent 0%,
                    transparent 46%,
                    rgba(0,145,218,.14) 50%,
                    transparent 54%,
                    transparent 100%
                );

        const parseProjectName = (name) => {
            const regex = /^(\d{4})년\s+(상반기|하반기)\s+(.+)$/;
            const match = String(name).match(regex);
            if (match) {
                return {
                    year: parseInt(match[1]),
                    half: match[2],
                    scenario: match[3]
                };
            }
            return {
                year: null,
                half: null,
                scenario: name
            };
        };

        const buildHierarchy = (list) => {
            const root = {};
            const unclassified = [];

            list.forEach(p => {
                let y = p.year;
                let h = p.half;
                let s = p.scenario;

                if (!y || !h || !s) {
                    const parsed = parseProjectName(p.origName);
                    if (parsed.year) {
                        y = parsed.year;
                        h = parsed.half;
                        s = parsed.scenario;
                    }
                }

                if (y && h) {
                    const yKey = `${y}년`;
                    if (!root[yKey]) root[yKey] = {};
                    if (!root[yKey][h]) root[yKey][h] = [];
                    root[yKey][h].push({
                        origName: p.origName,
                        scenario: s,
                        description: p.description
                    });
                } else {
                    unclassified.push(p);
                }
            });

            return { classified: root, unclassified };
        };

                            if (!dict[p]) dict[p] = { land: 0, dev: 0, sup: 0, rec: 0, category: '기타' };

            const processExcelAndUpload = async () => {
                if (!uploadProjName) return setStatus({ type: 'error', message: '업로드할 새 대상 사업명을 직접 입력해주세요.' });
                if (!selectedFile) return setStatus({ type: 'error', message: '엑셀 파일을 선택해주세요.' });

                setStatus({ type: 'loading', message: '스마트 파싱 및 다중 DB 업데이트 시작...' });
                setLogs([]);

                const extractYear = (val) => {
                    if (val == null || val === '') return null;
                    if (typeof val === 'number') {
                        if (val > 1900 && val < 2100) return Math.floor(val);
                        if (val > 30000 && val < 90000) return new Date((val - 25569) * 86400 * 1000).getFullYear();
                    }
                    const m = String(val).match(/(19\d{2}|20\d{2})/);
                    return m ? Number(m[1]) : null;
                };

                const parseAmt = (val) => {
                    if (val == null || val === '' || val === '-') return 0;
                    if (typeof val === 'number') return val;
                    const n = Number(String(val).replace(/,/g, ''));
                    return isNaN(n) ? 0 : n;
                };

                try {
                    const parsed = parseProjectName(uploadProjName);
                    if (!parsed.year) {
                        throw new Error("대상 사업명 형식이 올바르지 않습니다. '연도년 반기 시나리오명'이어야 합니다. (예: 2025년 상반기 시나리오1)");
                    }

                    const reader = new FileReader();
                    reader.onload = async (e) => {
                        try {
                            const data = new Uint8Array(e.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            let totalInserted = 0;

                            const addLog = (msg) => setLogs(prev => [...prev, msg]);

                            addLog(`▶ [마스터생성] '${uploadProjName}' 마스터 등록 (있는 경우 패스)...`);

                            const { data: existMast } = await sbClient.from('master_project')
                                .select('*')
                                .eq('year', parsed.year)
                                .eq('half', parsed.half)
                                .eq('scenario', parsed.scenario);

                            if (!existMast || existMast.length === 0) {
                                const { error: mastErr } = await sbClient.from('master_project').insert({
                                    year: parsed.year,
                                    half: parsed.half,
                                    scenario: parsed.scenario,
                                    description: null
                                });
                                if (mastErr) throw mastErr;
                            }

                            addLog(`▶ [초기화] 기존 데이터 백지화 중...`);
                            for (const tbl of TABLES) {
                                const { error: delErr } = await sbClient.from(tbl.id)
                                    .delete()
                                    .eq('year', parsed.year)
                                    .eq('half', parsed.half)
                                    .eq('scenario', parsed.scenario);
                                if (delErr) throw delErr;
                            }

                            for (const sheetName of workbook.SheetNames) {
                                addLog(`[${sheetName}] 분류 분석 중...`);
                                const worksheet = workbook.Sheets[sheetName];
                                const rawData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                                if (rawData.length < 3) continue;

                                const headers = rawData[1];
                                const yearColumns = [];
                                for (let j = 0; j < headers.length; j++) {
                                    const y = extractYear(headers[j]);
                                    if (y) yearColumns.push({ index: j, year: y });
                                }
                                if (yearColumns.length === 0) continue;

                                const inserts = { land_costs: [], development_costs: [], supplies: [], recoveries: [] };
                                const isTradeSheet = sheetName.includes('공급') || sheetName.includes('회수');

                                const useTypeIdx = headers.indexOf('용도');
                                const plotIdx = headers.indexOf('필지');
                                const supYearIdx = headers.indexOf('공급연도');
                                const supAmtIdx = headers.indexOf('공급금액');

                                for (let i = 2; i < rawData.length; i++) {
                                    const row = rawData[i];
                                    if (!row || row.length === 0) continue;

                                    if (isTradeSheet) {
                                        const useType = useTypeIdx !== -1 ? String(row[useTypeIdx] || '').trim() : '';
                                        const plot = plotIdx !== -1 ? String(row[plotIdx] || '').trim() : '';
                                        let detailItem = useType + (plot ? ' - ' + plot : '');
                                        if (!detailItem) detailItem = String(row[0] || '').trim();
                                        if (!detailItem) continue;

                                        if (supYearIdx !== -1 && supAmtIdx !== -1) {
                                            const supplyYear = extractYear(row[supYearIdx]);
                                            const supplyAmt = parseAmt(row[supAmtIdx]);
                                            if (supplyYear && supplyYear > 0 && supplyAmt !== 0) {
                                                inserts.supplies.push({ 
                                                    year: parsed.year, 
                                                    half: parsed.half, 
                                                    scenario: parsed.scenario, 
                                                    detail_item: detailItem, 
                                                    target_year: supplyYear, 
                                                    amount: supplyAmt 
                                                });
                                            }
                                        }
                                        for (const col of yearColumns) {
                                            let amount = parseAmt(row[col.index]);
                                            if (amount === 0) continue;
                                            inserts.recoveries.push({ 
                                                year: parsed.year, 
                                                half: parsed.half, 
                                                scenario: parsed.scenario, 
                                                detail_item: detailItem, 
                                                target_year: col.year, 
                                                amount: amount 
                                            });
                                        }
                                    } else {
                                        const detailItem = String(row[0] || '').trim();
                                        if (!detailItem || detailItem === 'undefined') continue;

                                        for (const col of yearColumns) {
                                            let amount = parseAmt(row[col.index]);
                                            if (amount === 0) continue;
                                            const costData = { 
                                                year: parsed.year, 
                                                half: parsed.half, 
                                                scenario: parsed.scenario, 
                                                detail_item: detailItem, 
                                                target_year: col.year, 
                                                amount: amount 
                                            };
                                            if (sheetName.includes('용지')) inserts.land_costs.push(costData);
                                            else if (sheetName.includes('조성')) inserts.development_costs.push(costData);
                                        }
                                    }
                                }

                                for (const [tableName, tableData] of Object.entries(inserts)) {
                                    if (tableData.length > 0) {
                                        addLog(`  -> ${tableName} Insert : ${tableData.length} records...`);
                                        for (let chunk = 0; chunk < tableData.length; chunk += 1000) {
                                            const sliceData = tableData.slice(chunk, chunk + 1000);
                                            const { error } = await sbClient.from(tableName).insert(sliceData);
                                            if (error) throw new Error(`[${tableName}] 에러: ${error.message}`);
                                        }
                                        totalInserted += tableData.length;
                                    }
                                }
                            }
                            if (totalInserted === 0) throw new Error('변환할 유효 데이터가 없습니다.');

                            setStatus({ type: 'success', message: `수신 성공: 총 ${totalInserted}건이 정상 등록되었습니다.` });
                            setSelectedFile(null);

                            setTimeout(() => { loadDashboard(); }, 1000);

                        } catch (err) { setStatus({ type: 'error', message: `Exception: ${err.message}` }); }
                    };

            // ✅ 중장기 10개년 재무전망 데이터 집계 함수
            const getOutlookData = () => {
                const parsed = parseProjectName(projectName);
                const by = parsed.year || 2025;
                const half = parsed.half;
                const scen = parsed.scenario;
                const years = Array.from({ length: 10 }, (_, i) => by + i);

                    return (arr || []).filter(row => row.year === by && row.half === half && row.scenario === scen);
                };

                const fLand = filterProj(dbLand);
                const fDev = filterProj(dbDev);
                const fSup = filterProj(dbSup);
                const fRec = filterProj(dbRec);

                const landMap = {};
                const devMap = {};
                const supMap = {};
                const recMap = {};

                years.forEach(y => {
                    landMap[y] = 0;
                    devMap[y] = 0;
                    supMap[y] = 0;
                    recMap[y] = 0;
                });

                fLand.forEach(r => { if (landMap[r.target_year] !== undefined) landMap[r.target_year] += r.amount; });
                fDev.forEach(r => { if (devMap[r.target_year] !== undefined) devMap[r.target_year] += r.amount; });
                fSup.forEach(r => { if (supMap[r.target_year] !== undefined) supMap[r.target_year] += r.amount; });
                fRec.forEach(r => { if (recMap[r.target_year] !== undefined) recMap[r.target_year] += r.amount; });

                const rows = [
                    { label: '용지비 (Land Costs)', data: years.map(y => landMap[y]), type: 'expense' },
                    { label: '조성비 (Development Costs)', data: years.map(y => devMap[y]), type: 'expense' },
                    { label: '투자 지출 계 (A)', data: years.map(y => landMap[y] + devMap[y]), type: 'subtotal' },
                    { label: '분양 수입 (Supplies)', data: years.map(y => supMap[y]), type: 'revenue' },
                    { label: '자금 회수액 (Recoveries)', data: years.map(y => recMap[y]), type: 'revenue' },
                    { label: '회수/유입 계 (B)', data: years.map(y => supMap[y] + recMap[y]), type: 'subtotal' },
                    { label: '당해년 순현금흐름 (B - A)', data: years.map(y => (supMap[y] + recMap[y]) - (landMap[y] + devMap[y])), type: 'ncf' },
                ];

                const ncfRow = rows[6].data;
                const cumulative = [];
                let runningSum = 0;
                ncfRow.forEach(val => {
                    runningSum += val;
                    cumulative.push(runningSum);
                });
                rows.push({ label: '누적 자금 수지 (Cumulative Balance)', data: cumulative, type: 'cumulative' });

                return { years, rows };

            const executeDataView = async () => {

                setStatus({ type: 'loading', message: 'DB 연산조회 중...' });

                try {
                    const data = await fetchAllRows(viewTable, projectName);
                    if (!data || data.length === 0) return setStatus({ type: 'error', message: '해당 조건으로 등록된 실적이 없습니다.' });

                    const yearSet = new Set();
                    const itemMap = new Map();

                    data.forEach(d => {
                        yearSet.add(d.target_year);
                        if (!itemMap.has(d.detail_item)) itemMap.set(d.detail_item, {});
                        itemMap.get(d.detail_item)[d.target_year] = (itemMap.get(d.detail_item)[d.target_year] || 0) + d.amount;
                    });

                    const sortedYears = Array.from(yearSet).sort((a, b) => a - b);
                    const pivotArray = [];

                    for (const [itemName, amounts] of itemMap.entries()) {
                        let total = 0;
                        const yData = {};
                        sortedYears.forEach(y => {
                            const amt = amounts[y] || 0;
                            yData[y] = amt;
                            total += amt;
                        });
                        pivotArray.push({ detailItem: itemName, yearData: yData, total });
                    }
                    setViewYears(sortedYears);
                    setViewData(pivotArray);
                    setStatus(null);
                } catch (err) { setStatus({ type: 'error', message: `DB 오류: ${err.message}` }); }
            };

            const executeReport = async () => {
                if (!projectName) return setStatus({ type: 'error', message: '리스트에서 사업명을 선택하세요.' });
                setStatus({ type: 'loading', message: '재무 연산 중...' });
                setReportData([]);
                setReportStats(null);

                try {
                    const [dataLand, dataDev, dataSup, dataRec] = await Promise.all([
                        fetchAllRows('land_costs', projectName),
                        fetchAllRows('development_costs', projectName),
                        fetchAllRows('supplies', projectName),
                        fetchAllRows('recoveries', projectName)
                    ]);

                    const allYears = new Set();
                    const grouped = {};

                    const addAmount = (year, type, amt) => {
                        if (!grouped[year]) grouped[year] = { investment: 0, supply: 0, recovery: 0 };
                        grouped[year][type] += amt;
                        allYears.add(year);
                    };

                    (dataLand || []).forEach(d => addAmount(d.target_year, 'investment', d.amount));
                    (dataDev || []).forEach(d => addAmount(d.target_year, 'investment', d.amount));
                    (dataSup || []).forEach(d => addAmount(d.target_year, 'supply', d.amount));
                    (dataRec || []).forEach(d => addAmount(d.target_year, 'recovery', d.amount));

                    const sortedYears = Array.from(allYears).sort((a, b) => a - b);
                    const rData = [];
                    let cumulative = 0;

                    let totalInv = 0, totalSup = 0, totalRec = 0;

                    for (const y of sortedYears) {
                        const row = grouped[y];
                        const net = row.recovery - row.investment;
                        cumulative += net;
                        rData.push({ year: y, investment: row.investment, recovery: row.recovery, supply: row.supply, netFlow: net, cumulative: cumulative });
                        totalInv += row.investment;
                        totalSup += row.supply;
                        totalRec += row.recovery;
                    }

                    let npv = 0;
                    let irr = 0;
                    if (rData.length > 0) {
                        const firstYear = rData[0].year;
                        const rate = 0.045;
                        rData.forEach((r) => {
                            const t = r.year - firstYear;
                            npv += r.netFlow / Math.pow(1 + rate, t);
                        });

                        const lastYear = rData[rData.length - 1].year;
                        const cfArray = [];
                        for (let y = firstYear; y <= lastYear; y++) {
                            const found = rData.find(d => d.year === y);
                            cfArray.push(found ? found.netFlow : 0);
                        }

                        const calculateIRR = (cashFlows, guess = 0.1) => {
                            const maxIter = 1000;
                            const epsilon = 1e-6;
                            let rate = guess;
                            for (let i = 0; i < maxIter; i++) {
                                let npv = 0;
                                let deriv = 0;
                                for (let t = 0; t < cashFlows.length; t++) {
                                    npv += cashFlows[t] / Math.pow(1 + rate, t);
                                    deriv -= t * cashFlows[t] / Math.pow(1 + rate, t + 1);
                                }
                                if (Math.abs(npv) < epsilon) break;
                                if (Math.abs(deriv) < epsilon) break;
                                const newRate = rate - npv / deriv;
                                if (Math.abs(newRate - rate) < epsilon) return newRate;
                                rate = newRate;
                            }
                            return 0; // fallback
                        };

                        const irrRaw = calculateIRR(cfArray);
                        if (irrRaw != null) irr = irrRaw;
                    }

                    setStatus(rData.length > 0 ? null : { type: 'error', message: '분석 가능한 투자/회수 실적이 없습니다.' });
                    setReportData(rData);
                    setReportStats({ totalInv, totalSup, totalRec, npv, irr });
                } catch (err) { setStatus({ type: 'error', message: `분석 실패: ${err.message}` }); }
            };

            const triggerQuery = () => {
                if (appMode === 'view') executeDataView();

            const sanitizeExcelText = (value, fallback = '미지정') => {

                return clean || fallback;
            };

            const sanitizeSheetName = (value) => sanitizeExcelText(value).slice(0, 31);

            const getExportMenuName = () => ({
                project_mgr: '프로젝트등록관리',
                dashboard: '전체사업대시보드',
                management: '마스터프로젝트제어',
                view: '데이터조회',

            };

            const styleWorksheet = (ws, rows) => {
                if (!rows || rows.length === 0) return ws;

                const range = XLSX.utils.decode_range(ws['!ref']);
                const headerFill = { fgColor: { rgb: '1F2937' } };
                const totalFill = { fgColor: { rgb: 'EEF2FF' } };
                const border = {
                    top: { style: 'thin', color: { rgb: 'D9E2EC' } },
                    bottom: { style: 'thin', color: { rgb: 'D9E2EC' } },
                    left: { style: 'thin', color: { rgb: 'D9E2EC' } },
                    right: { style: 'thin', color: { rgb: 'D9E2EC' } }
                };
                const widths = [];

                for (let c = range.s.c; c <= range.e.c; c++) {
                    const headerAddress = XLSX.utils.encode_cell({ r: 0, c });
                    const headerCell = ws[headerAddress];
                    const headerText = headerCell?.v ? String(headerCell.v) : '';
                    let maxWidth = headerText.length;

                    if (headerCell) {
                        headerCell.s = {
                            font: { bold: true, color: { rgb: 'FFFFFF' } },
                            fill: headerFill,
                            alignment: { horizontal: 'center', vertical: 'center' },
                            border
                        };
                    }

                    for (let r = range.s.r + 1; r <= range.e.r; r++) {
                        const address = XLSX.utils.encode_cell({ r, c });
                        const cell = ws[address];
                        if (!cell) continue;

                        const isNumber = typeof cell.v === 'number';
                        const isTotalColumn = /총계|총투입|총회수|수지|누적|NCF/.test(headerText);
                        maxWidth = Math.max(maxWidth, String(cell.v ?? '').length);
                        cell.s = {
                            font: { color: { rgb: isNumber && cell.v < 0 ? 'DC2626' : '111827' } },
                            fill: isTotalColumn ? totalFill : { fgColor: { rgb: 'FFFFFF' } },
                            alignment: {
                                horizontal: isNumber ? 'right' : 'left',
                                vertical: 'center',
                                wrapText: true
                            },
                            border,
                            numFmt: isNumber ? '#,##0;[Red]-#,##0;0' : undefined
                        };
                    }

                    widths.push({ wch: Math.min(Math.max(maxWidth + 2, c === 0 ? 18 : 12), 28) });
                }

                ws['!cols'] = widths;
                ws['!rows'] = [{ hpt: 24 }];
                ws['!autofilter'] = { ref: ws['!ref'] };
                return ws;
            };

            const appendStyledSheet = (wb, rows, sheetName) => {

            const exportToExcel = () => {

                let wb = XLSX.utils.book_new();

                if (appMode === 'dashboard') {

                        [`총회수(${unitStr})`]: p.rec / scale,
                        [`수지차액(${unitStr})`]: (p.rec - p.land - p.dev) / scale
                    }));
                    appendStyledSheet(wb, pRows, "대시보드_사업별");

                    let cRows = dashStats.categoryGrp.map(c => ({

                }
                else if (appMode === 'project_mgr') {
                    if (!manageList.length) return;
                    let pRows = manageList.map(m => ({
                        '프로젝트식별명': m.origName,
                        '연도': m.year ? `${m.year}년` : '',
                        '반기': m.half || '',

                    appendStyledSheet(wb, pRows, "프로젝트현황");
                }
                else if (appMode === 'management') {

                    let mRows = manageList.map(m => ({

                    let vRows = viewData.map(row => {

                        viewYears.forEach(y => r[`${y}년(${unitStr})`] = (row.yearData[y] || 0) / scale);
                        r[`총계(${unitStr})`] = row.total / scale;
                        return r;
                    });
                    appendStyledSheet(wb, vRows, `${projectName}_${TABLES.find(t => t.id === viewTable)?.label}`);
                }
                else if (appMode === 'report') {
                    if (!reportData || reportData.length === 0) return;
                    let rRows = reportData.map(r => ({
                        '귀속연도': `${r.year}년`,
                        [`투입액(${unitStr})`]: r.investment / scale,
                        [`회수액(${unitStr})`]: r.recovery / scale,
                        [`순흐름_NCF(${unitStr})`]: r.netFlow / scale,
                        [`누적자금수지(${unitStr})`]: r.cumulative / scale
                    }));
                    appendStyledSheet(wb, rRows, `${projectName}_현금흐름`);
                }

                if (!wb.SheetNames.length) {
                    setStatus({ type: 'error', message: '현재 상태에서 내보낼 데이터가 없습니다.' });
                    return;
                }
                XLSX.writeFile(wb, getExportFileName());
                setStatus({ type: 'success', message: `엑셀 다운로드가 완료되었습니다. 출력된 수치는 사용자 맞춤형 출력 단위인 [${unitStr}] 기준입니다.` });
            };

            useEffect(() => {
                if (appMode === 'report' && reportData.length > 0 && chartCanvasRef.current) {
                    if (chartInstanceRef.current) chartInstanceRef.current.destroy();

                    const ctx = chartCanvasRef.current.getContext('2d');

                    const labels = reportData.map(d => d.year + '년');
                    const dataInv = reportData.map(d => d.investment);
                    const dataRec = reportData.map(d => d.recovery);
                    const dataSup = reportData.map(d => d.supply);

                    const scale = getScale();

                    chartInstanceRef.current = new Chart(ctx, {

                            labels,
                            datasets: [

                                    label: '투자 규모 (Outflow)',
                                    data: dataInv.map(v => Math.abs(v) / scale),
                                    backgroundColor: 'rgba(0, 74, 156, 0.12)',
                                    borderColor: '#004a9c',
                                    borderWidth: 2,
                                    fill: true,
                                    tension: 0.35,

                                tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${Math.round(ctx.raw).toLocaleString()}${amountUnit}` } }

            // 현재 로그인한 사용자의 이메일 (세션에서 추출)

            // =========================================================================
