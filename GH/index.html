<!DOCTYPE html>
<html lang="ko">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재무 의사결정지원 시스템 | GH</title>

    <!-- 앱 스타일 -->

    <!-- 라이브러리 (오프라인) -->

    <script src="lib/react-dom.production.min.js"></script>

<body>
    <!-- ═══════════════════════════════════════════════════════
         랜딩 페이지 (Shadow DOM으로 격리)
    ════════════════════════════════════════════════════════ -->
    <div id="landing-host"></div>

    <template id="landing-template">
        <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:   #004a9c;
            --blue-2: #0091da;
            --sans:   'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        html { background: #060f1c; }

        body {
            min-height: 100vh;
            font-family: var(--sans);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; text-decoration: none; }

        /* HEADER */
        .site-header {
            position: fixed;
            z-index: 50;
            top: 0; left: 0; right: 0;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(246,249,252,.88);
            box-shadow: 0 1px 0 rgba(226,232,240,.88), 0 12px 36px rgba(15,23,42,.06);
            backdrop-filter: blur(16px);
        }

        .nav {
            width: min(1200px, calc(100% - 48px));
            display: flex;
            align-items: center;
        }

        .brand img {
            width: 172px;
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 2px 12px rgba(0,74,156,.22));
        }

        /* HERO */
        .hero {
            height: 100vh;
            min-height: 620px;
            position: relative;
            display: grid;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
            color: #fff;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: -3;
            background: url('assets/gh-main-visual.jpg') center / cover no-repeat;
            animation: heroDrift 10s ease-in-out infinite alternate;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/gh-main-visual-2.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 3s infinite;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/gh-main-visual-3.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 6s infinite;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: -2;
            background:
                linear-gradient(180deg, rgba(0,30,80,.36) 0%, transparent 20%, rgba(4,10,22,.52) 100%),
                linear-gradient(108deg, rgba(4,10,22,.82) 0%, rgba(4,10,22,.60) 40%, rgba(4,10,22,.28) 66%, rgba(4,10,22,.38) 100%);
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(189,239,255,.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(189,239,255,.06) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
            background-size: 96px 96px, 96px 96px, 24px 24px, 24px 24px;
            mask-image:
                linear-gradient(90deg, transparent 0%, rgba(0,0,0,.55) 14%, rgba(0,0,0,.55) 82%, transparent 100%),
                linear-gradient(180deg, rgba(0,0,0,.4) 0%, rgba(0,0,0,.7) 50%, transparent 100%);
            mask-composite: intersect;
            opacity: .78;
            animation: gridDrift 16s linear infinite;
        }

        .hero-grid::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(189,239,255,.02) 42%, rgba(189,239,255,.18) 50%, rgba(189,239,255,.02) 58%, transparent 100%);
            transform: translateX(-62%);
            animation: scanAcross 5.8s ease-in-out infinite;
        }

        .hero-grid::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 46%, rgba(0,145,218,.14) 50%, transparent 54%);
            opacity: .55;
            transform: translate3d(-18%,-18%,0);
            animation: diagonalSweep 7.2s ease-in-out infinite;
        }

        .hero-inner {
            width: min(1200px, calc(100% - 48px));
            margin: 0 auto;
            padding-top: 72px;
            display: grid;
            grid-template-columns: 1fr 340px;
            align-items: center;
            gap: clamp(48px, 6vw, 96px);
        }

        .hero-copy { max-width: 620px; }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 26px;
            padding: 0 11px 0 7px;
            background: rgba(0,145,218,.13);
            border: 1px solid rgba(0,145,218,.28);
            border-radius: 999px;
            color: rgba(189,239,255,.88);
            font-size: 10.5px;
            font-weight: 750;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 22px;
            animation: riseIn .8s ease both;
        }

        .eyebrow-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--blue-2);
            box-shadow: 0 0 9px rgba(0,145,218,1);
            flex-shrink: 0;
        }

        .hero h1 {
            font-size: clamp(34px, 3.4vw, 58px);
            line-height: 1.14;
            letter-spacing: -.03em;
            font-weight: 850;
            text-wrap: balance;
            animation: riseIn .9s .07s ease both;
        }

        .hero h1 em { font-style: normal; color: #bdefff; text-shadow: 0 0 48px rgba(0,145,218,.28); }

        .hero-desc {
            margin-top: 20px;
            color: rgba(255,255,255,.68);
            font-size: clamp(14px, 1.35vw, 17px);
            line-height: 1.72;
            font-weight: 500;
            animation: riseIn .9s .16s ease both;
        }

        /* ENTRY PANEL */
        .entry-panel { animation: riseIn .9s .24s ease both; position: relative; }

        .ep-card {
            position: relative;
            padding: 22px 24px 20px;
            background: rgba(5,14,28,.58);
            backdrop-filter: blur(36px);
            border: 1px solid rgba(255,255,255,.11);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 28px 72px rgba(0,0,0,.54);
        }

        .ep-card::before {
            content: '';
            position: absolute;
            top: 0; left: 18%; right: 18%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(189,239,255,.32), transparent);
        }

        .ep-card::after {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(0,145,218,.14) 0%, transparent 70%);
            pointer-events: none;
        }

        .ep-name { font-size: 20px; font-weight: 800; color: rgba(255,255,255,.95); line-height: 1.28; letter-spacing: -.025em; margin-bottom: 4px; }
        .ep-name-en { font-size: 10.5px; font-weight: 600; color: rgba(189,239,255,.42); letter-spacing: .04em; margin-bottom: 15px; }
        .ep-rule { height: 1px; background: linear-gradient(90deg, rgba(255,255,255,.09) 0%, rgba(255,255,255,.02) 100%); margin-bottom: 14px; }
        .ep-desc { font-size: 12.5px; color: rgba(196,220,248,.58); line-height: 1.72; font-weight: 500; margin-bottom: 18px; }

        .ep-enter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 50px;
            padding: 0 13px 0 20px;
            background: linear-gradient(118deg, rgba(255,255,255,.075), rgba(255,255,255,.035)), rgba(6,16,30,.44);
            border: 1px solid rgba(189,239,255,.16);
            border-radius: 11px;
            color: rgba(238,247,255,.74);
            font-size: 13.5px;
            font-weight: 750;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 22px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.08);
            opacity: .74;
            transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, color .22s ease, opacity .22s ease;
            margin-bottom: 14px;
        }

        .ep-enter:hover, .ep-enter:focus-visible {
            transform: translateY(-2px);
            background: linear-gradient(118deg, rgba(0,74,156,.92) 0%, rgba(0,145,218,.72) 100%), rgba(8,28,52,.72);
            border-color: rgba(189,239,255,.46);
            color: #fff;
            box-shadow: 0 14px 36px rgba(0,145,218,.38), inset 0 1px 0 rgba(255,255,255,.14);
            opacity: 1;
            outline: none;
        }

        .ep-enter:active { transform: translateY(0); }

        .ep-arrow-wrap {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: rgba(255,255,255,.08);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: transform .22s ease, background .22s ease;
        }

        .ep-enter:hover .ep-arrow-wrap { transform: translateX(3px); background: rgba(255,255,255,.16); }

        /* ANIMATIONS */
        @keyframes heroDrift {
            from { transform: scale(1.05) translate3d(0,0,0); }
            to   { transform: scale(1.12) translate3d(-1.4%,.8%,0); }
        }
        @keyframes imgCross {
            0%,28%  { opacity: 0; }
            34%,60% { opacity: 1; }
            66%,100%{ opacity: 0; }
        }
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes gridDrift {
            from { background-position: 0 0,0 0,0 0,0 0; }
            to   { background-position: 96px 96px,96px 96px,24px 24px,24px 24px; }
        }
        @keyframes scanAcross {
            0%,12%  { transform: translateX(-68%); opacity: 0; }
            28%,62% { opacity: .72; }
            88%,100%{ transform: translateX(68%); opacity: 0; }
        }
        @keyframes diagonalSweep {
            0%,18%  { transform: translate3d(-26%,-26%,0); opacity: 0; }
            44%,70% { opacity: .5; }
            100%    { transform: translate3d(26%,26%,0); opacity: 0; }
        }

        @media (max-width: 920px) {
            .hero-inner { grid-template-columns: 1fr; gap: 28px; align-items: start; padding-top: 100px; }
            .entry-panel { width: min(340px, 100%); }
        }
        @media (max-width: 600px) {
            .brand img { width: 148px; }
            .hero-inner { width: calc(100% - 32px); padding-top: 92px; }
            .hero h1 { font-size: 30px; }
            .entry-panel { width: 100%; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
        }
        </style>

        <header class="site-header">
            <nav class="nav" aria-label="주요 메뉴">
                <a class="brand" href="#">
                    <img src="assets/gh-header-logo.png" alt="GH 경기주택도시공사" width="172" height="44">
                </a>
            </nav>
        </header>

        <main>
            <section class="hero" aria-labelledby="heroTitle">
                <div class="hero-bg"></div>
                <div class="hero-overlay"></div>
                <div class="hero-grid"></div>

                <div class="hero-inner">
                    <div class="hero-copy">
                        <div class="eyebrow" aria-label="Financial Decision Support System">
                            <span class="eyebrow-dot" aria-hidden="true"></span>
                            Financial Decision Support System
                        </div>
                        <h1 id="heroTitle">
                            대한민국 도시주택의<br>
                            <em>미래를 만들어가는</em> GH
                        </h1>
                        <p class="hero-desc">재무 의사결정지원 시스템</p>
                    </div>

                    <aside class="entry-panel" aria-label="시스템 입장">
                        <div class="ep-card">
                            <h2 class="ep-name">재무 의사결정 지원 시스템</h2>
                            <p class="ep-name-en">Financial Decision Support System</p>
                            <div class="ep-rule"></div>
                            <p class="ep-desc">중장기 사업계획 기반<br>통합 의사결정 지원 시스템</p>
                            <a class="ep-enter" href="index.html">
                                <span>시스템 입장하기</span>
                                <span class="ep-arrow-wrap" aria-hidden="true">
                                    <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                                        <path d="M2 7H12M8 3L12 7L8 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </span>
                            </a>
                        </div>
                    </aside>
                </div>
            </section>
        </main>
    </template>

    <!-- ═══════════════════════════════════════════════════════
         React 앱 마운트 포인트
    ════════════════════════════════════════════════════════ -->
    <div id="root" style="display:none" aria-hidden="true"></div>

    <!-- 랜딩 → 앱 전환 스크립트 -->
    <script>
        (() => {
            const host     = document.getElementById('landing-host');
            const root     = document.getElementById('root');
            const template = document.getElementById('landing-template');
            if (!host || !root || !template) return;

            host.style.cssText = 'position:fixed;inset:0;z-index:9999;display:block;background:#020812;';

            const shadow = host.attachShadow({ mode: 'open' });
            shadow.appendChild(template.content.cloneNode(true));

            const enterSystem = (e) => {
                e.preventDefault();
                host.style.display = 'none';
                root.style.display = 'block';
                root.removeAttribute('aria-hidden');
                document.body.classList.add('app-entered');
            };

            shadow.querySelectorAll('a[href="index.html"], .ep-enter').forEach(el => {
                el.addEventListener('click', enterSystem);
            });
        })();
    </script>

    <!-- ═══════════════════════════════════════════════════════
         React 컴포넌트 (Babel JSX · 인라인)
         file:// 로컬 실행 호환 — src 속성 대신 인라인으로 포함
         소스 원본은 js/ 폴더에 분리 보관
    ════════════════════════════════════════════════════════ -->
    <script type="text/babel">
    // ── Login.js ────────────────────────────────────────────
    function LoginScreen({ onLoginSuccess }) {
        const [email,    setEmail]    = React.useState('');
        const [password, setPassword] = React.useState('');
        const [loading,  setLoading]  = React.useState(false);
        const [error,    setError]    = React.useState('');

        const handleLogin = async (e) => {
            e.preventDefault();
            if (!email || !password) { setError('이메일과 비밀번호를 모두 입력해주세요.'); return; }
            setLoading(true); setError('');
            try {
                const { data, error: authErr } = await window.db.auth.signIn(email.trim(), password);
                if (authErr) throw authErr;
                if (data?.session) { onLoginSuccess(data.session); }
                else throw new Error('세션 발급에 실패했습니다.');
            } catch (err) {
                let msg = err.message || '로그인에 실패했습니다.';
                if (msg.includes('Invalid login credentials')) msg = '이메일 또는 비밀번호가 일치하지 않습니다.';
                else if (msg.includes('Email not confirmed')) msg = '이메일 인증이 완료되지 않았습니다. 관리자에게 문의하세요.';
                setError(msg);
            } finally { setLoading(false); }
        };

        return (
            <div className="login-bg">
                <div className="login-card">
                    <div className="login-head">
                        <div className="login-mark">
                            <div className="login-mark-dot"><img src="assets/gh-header-logo.png" alt="GH CI" /></div>
                            <div className="login-mark-name">GH · 재무 의사결정지원 시스템</div>
                        </div>
                        <div className="login-title">로그인</div>
                        <div className="login-sub">승인된 운영자 계정으로 데이터 파이프라인에 접근합니다</div>
                    </div>
                    <form className="login-body" onSubmit={handleLogin}>
                        {error && <div className="login-err">{error}</div>}
                        <div className="login-field">
                            <label className="login-lbl">이메일</label>
                            <input type="email" className="login-inp" value={email} onChange={e => setEmail(e.target.value)} placeholder="admin@company.local" autoFocus disabled={loading} />
                        </div>
                        <div className="login-field">
                            <label className="login-lbl">비밀번호</label>
                            <input type="password" className="login-inp" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" disabled={loading} />
                        </div>
                        <button type="submit" className="login-btn" disabled={loading}>{loading ? '인증 중...' : '로그인'}</button>
                    </form>
                    <div className="login-footer">Secured by Auth · 승인된 사용자만 접근 가능</div>
                </div>
            </div>
        );
    }
    </script>

    <script type="text/babel">
    // ── Sidebar.js ───────────────────────────────────────────
    const NAV = [
        { group: '관리 및 설정', items: [
            { id: 'project_mgr',   label: '프로젝트 등록 및 관리', icon: 'M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2' },
            { id: 'biz_master_mgr',label: '사업마스터관리',         icon: 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z' },
            { id: 'excel_upload',  label: '엑셀 업로드',            icon: 'M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12' },
            { id: 'settings_mgr',  label: '설정',                   icon: 'M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z M12 15a3 3 0 1 1 0-6 3 3 0 0 1 0 6z' },
        ]},
    ];

    function Sidebar({ appMode, setAppMode, onLogout, userEmail }) {
        const userInitial = userEmail.charAt(0).toUpperCase();
        return (
            <aside className="sidebar">
                <div className="sb-brand">
                    <div className="sb-mark"><img src="assets/gh-header-logo.png" alt="GH CI" /></div>
                    <div>
                        <div className="sb-brand-name">재무 의사결정지원 시스템</div>
                        <div className="sb-brand-sub">Financial Decision Support</div>
                    </div>
                </div>
                <nav className="sb-nav">
                    {NAV.map((g, gi) => (
                        <div key={gi}>
                            <div className="sb-grp">{g.group}</div>
                            {g.items.map(it => (
                                <div key={it.id} className={`sb-item ${appMode === it.id ? 'active' : ''}`} onClick={() => setAppMode(it.id)}>
                                    <svg className="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d={it.icon} /></svg>
                                    <span>{it.label}</span>
                                </div>
                            ))}
                        </div>
                    ))}
                </nav>
                <div className="sb-foot">
                    <div className="sb-avatar">{userInitial}</div>
                    <div className="sb-user-meta">
                        <div className="sb-user-name">{userEmail}</div>
                        <div className="sb-user-status">DB 정상</div>
                    </div>
                    <button className="logout-btn" onClick={onLogout}>로그아웃</button>
                </div>
            </aside>
        );
    }
    </script>

    <script type="text/babel">
    // ── Stub.js ──────────────────────────────────────────────
    const STUB_META = {
        biz_master_mgr: { icon: '🏗️', title: '사업마스터관리',  desc: '전체 사업 마스터 데이터의 통합 편집·분류·이관 기능을 제공합니다.' },

    <script type="text/babel">

                                    <button type="button" className={`seg-btn ${projScenarioType === '기본안' ? 'active' : ''}`} onClick={() => { setProjScenarioType('기본안'); setProjScenarioDesc(''); }}>기본안</button>

                                        </select>

                            <div>
                                <label className="login-lbl">시나리오 설명</label>
                                <textarea className="popt-inp" style={{ width: '100%', height: '70px', resize: 'none' }} value={projScenarioDesc} onChange={e => setProjScenarioDesc(e.target.value)}
                                    placeholder={projScenarioType === '기본안' ? '기본안은 설명이 필요하지 않습니다.' : '시나리오 상세 설명을 입력하세요.'} disabled={projScenarioType === '기본안'} />
                            </div>
                            <button type="submit" className="tbtn acc" style={{ width: '100%', height: '40px', justifyContent: 'center', marginTop: '6px' }}>프로젝트 생성하기</button>
                        </form>
                    </div>

                    {/* 프로젝트 목록 */}
                    <div className="panel" style={{ display: 'flex', flexDirection: 'column', minHeight: '520px' }}>
                        <div className="phd"><div className="pt">마스터 프로젝트 목록 및 데이터 입력 현황</div></div>
                        <div className="pb" style={{ flex: 1, overflow: 'auto', padding: '15px' }}>
                            {manageList.length === 0 ? (
                                <div style={{ color: 'var(--text4)', textAlign: 'center', padding: '40px 0' }}>등록된 마스터 프로젝트가 없습니다.</div>
                            ) : (
                                <div style={{ overflowX: 'auto' }}>
                                    <table className="proj-table">
                                        <thead><tr><th>연도</th><th>반기</th><th>시나리오</th><th>설명</th><th style={{textAlign:'center'}}>토지비</th><th style={{textAlign:'center'}}>개발비</th><th style={{textAlign:'center'}}>분양</th><th style={{textAlign:'center'}}>회수</th><th style={{textAlign:'center'}}>관리</th></tr></thead>
                                        <tbody>

                                                    <td style={{ whiteSpace: 'normal', wordBreak: 'break-all', color: 'var(--text3)', fontSize: '11.5px', maxWidth: '150px' }}>{p.description || '-'}</td>

    <script type="text/babel">
    // ── DataView.js ──────────────────────────────────────────
    function DataView({ projectName, amountUnit, setStatus }) {
        const { TABLES } = window.APP_CONFIG;
        const [viewTable, setViewTable] = React.useState('land_costs');
        const [viewData,  setViewData]  = React.useState([]);
        const [viewYears, setViewYears] = React.useState([]);

        React.useEffect(() => { setViewData([]); setViewYears([]); }, [viewTable]);

        const execute = async () => {
            if (!projectName) { setStatus({ type: 'error', message: '대상 사업을 선택하세요.' }); return; }
            setStatus({ type: 'loading', message: 'DB 조회 중...' }); setViewData([]);
            try {
                const parsed = window.parseProjectName(projectName);
                const data = await window.db.getTableData(viewTable, { year: parsed.year, half: parsed.half, scenario: parsed.scenario });
                if (!data || data.length === 0) { setStatus({ type: 'error', message: '해당 조건으로 등록된 데이터가 없습니다.' }); return; }
                const yearSet = new Set(); const itemMap = new Map();
                data.forEach(d => {
                    yearSet.add(d.target_year);
                    if (!itemMap.has(d.detail_item)) itemMap.set(d.detail_item, {});
                    itemMap.get(d.detail_item)[d.target_year] = (itemMap.get(d.detail_item)[d.target_year] || 0) + d.amount;
                });
                const sortedYears = Array.from(yearSet).sort((a, b) => a - b);
                const pivotArray = [];
                for (const [itemName, amounts] of itemMap.entries()) {
                    let total = 0; const yData = {};
                    sortedYears.forEach(y => { const amt = amounts[y] || 0; yData[y] = amt; total += amt; });
                    pivotArray.push({ detailItem: itemName, yearData: yData, total });
                }
                setViewYears(sortedYears); setViewData(pivotArray); setStatus(null);
            } catch (err) { setStatus({ type: 'error', message: `DB 오류: ${err.message}` }); }
        };

        const reset = () => { setViewData([]); setViewYears([]); setStatus(null); };

        const exportToExcel = () => {
            if (!viewData.length) return;
            const scale = window.getScale(amountUnit); const wb = XLSX.utils.book_new();
            const rows = viewData.map(row => {
                const r = { '세부 항목명': row.detailItem };
                viewYears.forEach(y => r[`${y}년(${amountUnit})`] = (row.yearData[y] || 0) / scale);
                r[`총계(${amountUnit})`] = row.total / scale; return r;
            });
            window.appendStyledSheet(wb, rows, `${projectName}_${TABLES.find(t => t.id === viewTable)?.label}`);
            XLSX.writeFile(wb, `${window.sanitizeText(projectName)}_데이터조회.xlsx`);
        };

        return (
            <>
                <div className="tabbar">
                    {TABLES.map(t => (<div key={t.id} className={`tab ${viewTable === t.id ? 'active' : ''}`} onClick={() => setViewTable(t.id)}>{t.label} 뷰</div>))}
                </div>
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '10px 24px', background: '#fff', borderBottom: '1px solid var(--border)' }}>
                    <button className="tbtn acc" onClick={execute} disabled={!projectName}>조회 실행</button>
                    <button className="tbtn" onClick={reset}>초기화</button>
                    {viewData.length > 0 && <button className="tbtn" onClick={exportToExcel} style={{ marginLeft: 'auto' }}>엑셀 내보내기</button>}
                </div>
                {viewData.length > 0 && (
                    <div className="panel">
                        <div className="phd"><div className="pt">DB 조회결과 · {TABLES.find(t => t.id === viewTable)?.label}</div><span style={{ fontSize: '11.5px', color: 'var(--text3)' }}>단위: {amountUnit}</span></div>
                        <div className="pb0"><div className="grid-wrap" style={{ maxHeight: '500px' }}>
                            <table className="dgrid">
                                <thead><tr><th>세부 항목명</th>{viewYears.map(y => <th key={y}>{y}년</th>)}<th>총계</th></tr></thead>
                                <tbody>
                                    {viewData.map((row, i) => (
                                        <tr key={i}>
                                            <td>{row.detailItem}</td>
                                            {viewYears.map(y => (<td key={y} className={row.yearData[y] < 0 ? 'neg' : ''}>{window.formatAmount(row.yearData[y], amountUnit)}</td>))}
                                            <td className={row.total < 0 ? 'neg' : ''}>{window.formatAmount(row.total, amountUnit)}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div></div>
                    </div>
                )}
            </>
        );
    }
    </script>

    <script type="text/babel">
    // ── Report.js ────────────────────────────────────────────
    function Report({ projectName, amountUnit, setStatus }) {
        const [reportData,  setReportData]  = React.useState([]);
        const [reportStats, setReportStats] = React.useState(null);
        const chartCanvasRef   = React.useRef(null);
        const chartInstanceRef = React.useRef(null);

        const execute = async () => {
            if (!projectName) { setStatus({ type: 'error', message: '대상 사업을 선택하세요.' }); return; }
            setStatus({ type: 'loading', message: '재무 연산 중...' }); setReportData([]); setReportStats(null);
            try {
                const parsed = window.parseProjectName(projectName);
                const filter = { year: parsed.year, half: parsed.half, scenario: parsed.scenario };
                const [dataLand, dataDev, dataSup, dataRec] = await Promise.all([
                    window.db.getTableData('land_costs', filter), window.db.getTableData('development_costs', filter),
                    window.db.getTableData('supplies', filter),   window.db.getTableData('recoveries', filter),
                ]);
                const allYears = new Set(); const grouped = {};
                const add = (rows, type) => rows.forEach(d => {
                    if (!grouped[d.target_year]) grouped[d.target_year] = { investment: 0, supply: 0, recovery: 0 };
                    grouped[d.target_year][type] += d.amount; allYears.add(d.target_year);
                });
                add(dataLand||[], 'investment'); add(dataDev||[], 'investment');
                add(dataSup||[], 'supply'); add(dataRec||[], 'recovery');
                const sortedYears = Array.from(allYears).sort((a,b) => a-b);
                const rData = []; let cumulative=0, totalInv=0, totalSup=0, totalRec=0;
                for (const y of sortedYears) {
                    const row = grouped[y]; const net = row.recovery - row.investment; cumulative += net;
                    rData.push({ year:y, investment:row.investment, recovery:row.recovery, supply:row.supply, netFlow:net, cumulative });
                    totalInv+=row.investment; totalSup+=row.supply; totalRec+=row.recovery;
                }
                let npv=0, irr=0;
                if (rData.length > 0) {
                    const firstYear = rData[0].year; const rate = 0.045;
                    rData.forEach(r => { npv += r.netFlow / Math.pow(1+rate, r.year-firstYear); });
                    const lastYear = rData[rData.length-1].year; const cfArray=[];
                    for (let y=firstYear; y<=lastYear; y++) { const f=rData.find(d=>d.year===y); cfArray.push(f?f.netFlow:0); }
                    irr = window.calculateIRR(cfArray);
                }
                setStatus(rData.length>0 ? null : { type:'error', message:'분석 가능한 투자/회수 데이터가 없습니다.' });
                setReportData(rData); setReportStats({ totalInv, totalSup, totalRec, npv, irr });
            } catch (err) { setStatus({ type:'error', message:`분석 실패: ${err.message}` }); }
        };

        const reset = () => { setReportData([]); setReportStats(null); setStatus(null); };

        React.useEffect(() => {
            if (!reportData.length || !chartCanvasRef.current) return;
            if (chartInstanceRef.current) chartInstanceRef.current.destroy();
            const scale = window.getScale(amountUnit);
            chartInstanceRef.current = new Chart(chartCanvasRef.current.getContext('2d'), {
                type: 'line',
                data: { labels: reportData.map(d => d.year+'년'), datasets: [
                    { label:'투자 규모 (Outflow)', data:reportData.map(d=>Math.abs(d.investment)/scale), backgroundColor:'rgba(0,74,156,.12)', borderColor:'#004a9c', borderWidth:2, fill:true, tension:.35, pointRadius:2, pointHoverRadius:5, pointBackgroundColor:'#004a9c' },
                    { label:'회수 규모 (Inflow)',  data:reportData.map(d=>d.recovery/scale),             backgroundColor:'rgba(22,163,74,.18)', borderColor:'#16a34a', borderWidth:2, fill:true, tension:.35, pointRadius:2, pointHoverRadius:5, pointBackgroundColor:'#16a34a' },
                    { label:'공급 규모 (Supply)',  data:reportData.map(d=>d.supply/scale),               backgroundColor:'transparent',          borderColor:'#ea580c', borderWidth:2, fill:false, tension:.35, pointRadius:2, pointHoverRadius:5, pointBackgroundColor:'#ea580c', borderDash:[5,5] },
                ]},
                options: { responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
                    plugins:{ legend:{position:'top',labels:{font:{size:11,weight:'bold'},usePointStyle:true,boxWidth:8}}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${Math.round(c.raw).toLocaleString()}${amountUnit}`}} },
                    scales:{ x:{grid:{color:'#eaecf0'}}, y:{grid:{color:'#eaecf0'},ticks:{callback:v=>v+amountUnit},beginAtZero:true} } }
            });
        }, [reportData, amountUnit]);

        const exportToExcel = () => {
            if (!reportData.length) return;
            const scale=window.getScale(amountUnit); const wb=XLSX.utils.book_new();
            window.appendStyledSheet(wb, reportData.map(r=>({ '귀속연도':`${r.year}년`, [`투입액(${amountUnit})`]:r.investment/scale, [`회수액(${amountUnit})`]:r.recovery/scale, [`순흐름_NCF(${amountUnit})`]:r.netFlow/scale, [`누적자금수지(${amountUnit})`]:r.cumulative/scale })), `${projectName}_현금흐름`);
            XLSX.writeFile(wb, `${window.sanitizeText(projectName)}_현금흐름리포트.xlsx`);
        };

        const fmt = v => window.formatAmount(v, amountUnit);

        return (
            <>
                <div style={{ display:'flex', alignItems:'center', gap:'8px', padding:'10px 24px', background:'#fff', borderBottom:'1px solid var(--border)' }}>
                    <button className="tbtn acc" onClick={execute} disabled={!projectName}>분석 실행</button>
                    <button className="tbtn" onClick={reset}>초기화</button>
                    {reportData.length>0 && <button className="tbtn" onClick={exportToExcel} style={{marginLeft:'auto'}}>엑셀 내보내기</button>}
                </div>
                {reportStats && (
                    <div className="stat-row" style={{ gridTemplateColumns:'repeat(5,1fr)' }}>
                        <div className="scard b"><div className="sl">NPV (할인율 4.5%)</div><div><span className="sv">{fmt(reportStats.npv)}</span><span className="su">{amountUnit}</span></div><div className="ss">최초 투자연도 기준</div></div>
                        <div className="scard t"><div className="sl">IRR (내부수익률)</div><div><span className="sv">{(reportStats.irr*100).toFixed(2)}</span><span className="su">%</span></div><div className="ss">현금흐름 근사 추정치</div></div>
                        <div className="scard g"><div className="sl">총 투자 (용지+조성)</div><div><span className="sv">{fmt(reportStats.totalInv)}</span><span className="su">{amountUnit}</span></div><div className="ss">집행 예상/실적 총계</div></div>
                        <div className="scard o"><div className="sl">총 공급</div><div><span className="sv">{fmt(reportStats.totalSup)}</span><span className="su">{amountUnit}</span></div><div className="ss">분양/공급 계획 총계</div></div>
                        <div className="scard p"><div className="sl">총 회수</div><div><span className="sv">{fmt(reportStats.totalRec)}</span><span className="su">{amountUnit}</span></div><div className="ss">실 회수 실적 총계</div></div>
                    </div>
                )}
                {reportData.length>0 && (
                    <div className="panel" style={{ height:'300px', display:'flex', flexDirection:'column' }}>
                        <div className="phd" style={{flexShrink:0}}><div className="pt">투자 / 회수 추이 차트</div></div>
                        <div className="chart-contain" style={{padding:'10px'}}><canvas ref={chartCanvasRef}></canvas></div>
                    </div>
                )}
                {reportData.length>0 && (
                    <div className="panel"><div className="phd"><div className="pt">집행/회수 테이블 요약</div></div>
                        <div className="pb0"><div className="grid-wrap" style={{maxHeight:'350px'}}>
                            <table className="dgrid">
                                <thead><tr><th>귀속 연도</th><th>투입액 (용지/조성)</th><th>회수액</th><th>당해년 NCF</th><th>누적 자금수지</th></tr></thead>
                                <tbody>
                                    {reportData.map((r,i)=>(
                                        <tr key={i}>
                                            <td style={{textAlign:'center'}}>{r.year}년</td>
                                            <td className="neg">{fmt(r.investment)}</td>
                                            <td className="pos">{fmt(r.recovery)}</td>
                                            <td className={r.netFlow>=0?'pos':'neg'} style={{background:'var(--panel-2)'}}>{fmt(r.netFlow)}</td>
                                            <td className={r.cumulative>=0?'pos':'neg'} style={{background:'var(--acc-lt)',fontWeight:700}}>{fmt(r.cumulative)}</td>
                                        </tr>
                                    ))}
                                    <tr className="tot">
                                        <td style={{textAlign:'center'}}>총계</td>
                                        <td className="neg">{fmt(reportData.reduce((s,x)=>s+x.investment,0))}</td>
                                        <td className="pos">{fmt(reportData.reduce((s,x)=>s+x.recovery,0))}</td>
                                        <td className={reportData.reduce((s,x)=>s+x.netFlow,0)>=0?'pos':'neg'}>{fmt(reportData.reduce((s,x)=>s+x.netFlow,0))}</td>
                                        <td>-</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div></div>
                    </div>
                )}
            </>
        );
    }
    </script>

    <script type="text/babel">
    // ── App.js ───────────────────────────────────────────────
    const PAGE_LABEL = {
        project_mgr:    { eyebrow: 'Project List',    title: '프로젝트 등록 및 관리' },
        biz_master_mgr: { eyebrow: 'Business Master', title: '사업마스터관리' },
        excel_upload:   { eyebrow: 'Excel Upload',    title: '엑셀 업로드' },
        settings_mgr:   { eyebrow: 'Settings',        title: '설정' },
        view:           { eyebrow: 'Project Data',    title: '데이터 조회' },
        report:         { eyebrow: 'Project Analysis',title: '현금흐름 리포트' },
    };
    const STUB_MODES = new Set(['biz_master_mgr', 'excel_upload', 'settings_mgr']);

    function MainApp({ session, onLogout }) {
        const [appMode,     setAppMode]     = React.useState('project_mgr');
        const [amountUnit,  setAmountUnit]  = React.useState('억원');
        const [status,      setStatus]      = React.useState(null);
        const [manageList,  setManageList]  = React.useState([]);
        const [projectName, setProjectName] = React.useState('');
        const [nowTime,     setNowTime]     = React.useState('');

        React.useEffect(() => {
            const t = setInterval(() => setNowTime(new Date().toLocaleString('ko-KR', { hour12: false })), 1000);
            return () => clearInterval(t);
        }, []);

        const loadData = React.useCallback(async () => {
            setStatus({ type: 'loading', message: '마스터 데이터 동기화 중...' });
            try {
                const [masterRows, allData] = await Promise.all([window.db.getProjects(), window.db.getAllTableData()]);
                const { land: lRows, dev: dRows, sup: sRows, rec: rRows } = allData;
                const hasData = {};
                const mark = (rows, key) => (rows||[]).forEach(r => {
                    const k = `${r.year}_${r.half}_${r.scenario}`;
                    if (!hasData[k]) hasData[k] = { land:false, dev:false, sup:false, rec:false };
                    hasData[k][key] = true;
                });
                mark(lRows,'land'); mark(dRows,'dev'); mark(sRows,'sup'); mark(rRows,'rec');
                const list = (masterRows||[]).map(m => {
                    const k=`${m.year}_${m.half}_${m.scenario}`; const s=hasData[k]||{};
                    return { origName:`${m.year}년 ${m.half} ${m.scenario}`, name:`${m.year}년 ${m.half} ${m.scenario}`, year:m.year, half:m.half, scenario:m.scenario, description:m.description, hasLand:!!s.land, hasDev:!!s.dev, hasSup:!!s.sup, hasRec:!!s.rec };
                });
                list.sort((a,b) => { if(a.year!==b.year) return a.year-b.year; if(a.half!==b.half) return a.half==='상반기'?-1:1; return a.scenario.localeCompare(b.scenario,'ko'); });
                setManageList(list);
                if (list.length>0 && (!projectName || !list.some(x=>x.origName===projectName))) setProjectName(list[0].origName);
                setStatus(null);
            } catch (e) { setStatus({ type:'error', message:'데이터 로드 오류: '+e.message }); }
        }, []);

        React.useEffect(() => { loadData(); }, []);

        const handleSetMode = (mode) => { setAppMode(mode); setStatus(null); };
        const userEmail = session?.user?.email || '운영자';
        const pageLabel = PAGE_LABEL[appMode] || { eyebrow: 'System', title: appMode };
        const displayName = (() => {
            if (!projectName) return '(없음)';
            const p = window.parseProjectName(projectName);
            return p.year ? (p.scenario==='기본안' ? `${p.year}년 ${p.half}` : `${p.year}년 ${p.half} ${p.scenario}`) : projectName;
        })();

        return (
            <div className="shell">
                <Sidebar appMode={appMode} setAppMode={handleSetMode} onLogout={onLogout} userEmail={userEmail} />
                <div className="main">
                    <div className="topbar">
                        <div className="tb-title">
                            <div className="tb-eyebrow">{pageLabel.eyebrow}</div>
                            <div className="tb-pagename">{pageLabel.title}</div>
                        </div>
                        <div className="tb-meta">
                            {(appMode==='view'||appMode==='report') && (
                                <div className="tb-sec" style={{ borderRight:'1px solid var(--border)', paddingRight:'12px', marginRight:'6px' }}>
                                    <span className="tb-lbl" style={{marginRight:'6px'}}>📂 <b>대상 사업:</b></span>
                                    <select className="popt-inp" style={{ height:'30px', padding:'3px 8px', fontSize:'12px', minWidth:'180px' }} value={projectName} onChange={e=>setProjectName(e.target.value)}>
                                        {manageList.map(p => { const label=p.scenario==='기본안'?`${p.year}년 ${p.half}`:`${p.year}년 ${p.half} ${p.scenario}`; return <option key={p.origName} value={p.origName}>{label}</option>; })}
                                        {manageList.length===0 && <option value="">(등록된 프로젝트 없음)</option>}
                                    </select>
                                </div>
                            )}
                            {(appMode==='view'||appMode==='report') && <div className="tb-sec"><span className="tb-lbl">선택: <b style={{color:'var(--acc)'}}>{displayName}</b></span></div>}
                            {appMode==='project_mgr' && <div className="tb-sec"><span className="tb-lbl">프로젝트를 생성하고 관리하는 화면입니다</span></div>}
                        </div>
                    </div>
                    <div className="view-hd">
                        <div className="vt">{{ project_mgr:'PROJECT MANAGEMENT', view:'PIVOT CONSTRUCTOR', report:'FINANCIAL REPORT' }[appMode] || appMode.toUpperCase()}</div>
                        <div className="vmeta">
                            <span>출력 단위</span>
                            <select className="popt-inp" value={amountUnit} onChange={e=>setAmountUnit(e.target.value)}>
                                <option value="천원">천원</option><option value="백만원">백만원</option><option value="억원">억원 (기본)</option>
                            </select>
                        </div>
                    </div>
                    <div className="vbody">
                        {status && (
                            <div className={`alert-box alert-${status.type}`}>
                                <b>{{error:'오류',success:'완료',loading:'진행'}[status.type]||''}</b>
                                <span>{status.message}</span>
                            </div>
                        )}
                        {appMode==='project_mgr' && <ProjectMgr manageList={manageList} onRefresh={loadData} setStatus={setStatus} />}
                        {appMode==='view'         && <DataView   projectName={projectName} amountUnit={amountUnit} setStatus={setStatus} />}
                        {appMode==='report'       && <Report     projectName={projectName} amountUnit={amountUnit} setStatus={setStatus} />}
                        {STUB_MODES.has(appMode)  && <StubPage mode={appMode} />}
                    </div>
                    <div className="stbar">
                        <div className="sti">탭 <b style={{color:'var(--acc)'}}>{appMode.toUpperCase()}</b></div>
                        <div className="stsep"></div>
                        <div className="sti">DB <b>master_project + 4 tables</b></div>
                        <div className="stsep"></div>
                        <div className="sti"><b style={{color:'var(--green)'}}>● Auth Active</b></div>
                        <div style={{flex:1}}></div>
                        <div className="sti">{nowTime}</div>
                        <div className="stsep"></div>
                        <div className="sti">GH · v4.0</div>
                    </div>
                </div>
            </div>
        );
    }

    function App() {
        const [session,  setSession]  = React.useState(null);
        const [checking, setChecking] = React.useState(true);

        React.useEffect(() => {
            window.db.auth.getSession().then(({ data: { session: s } }) => { setSession(s); setChecking(false); });
            const { data: { subscription } } = window.db.auth.onAuthStateChange((event, s) => { setSession(s); });
            return () => subscription.unsubscribe();
        }, []);

        const handleLogout = async () => {
            if (!window.confirm('로그아웃 하시겠습니까?')) return;
            await window.db.auth.signOut(); setSession(null);
        };

        if (checking) return <div className="login-bg"><div style={{color:'#cbd5e1',fontSize:'13px',letterSpacing:'.02em'}}>세션 확인 중...</div></div>;
        if (!session) return <LoginScreen onLoginSuccess={setSession} />;
        return <MainApp session={session} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
