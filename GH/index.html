    <!-- ═══════════════════════════════════════════════════════
         랜딩 페이지 (Shadow DOM으로 격리)
    ════════════════════════════════════════════════════════ -->
    <div id="landing-host"></div>

    <template id="landing-template">
        <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:   #004a9c;
            --blue-2: #0091da;
            --sans:   'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
        }

        html { background: #060f1c; }

        body {
            min-height: 100vh;
            font-family: var(--sans);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a { color: inherit; text-decoration: none; }

        /* HEADER */
        .site-header {
            position: fixed;
            z-index: 50;
            top: 0; left: 0; right: 0;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(246,249,252,.88);
            box-shadow: 0 1px 0 rgba(226,232,240,.88), 0 12px 36px rgba(15,23,42,.06);
            backdrop-filter: blur(16px);
        }

        .nav {
            width: min(1200px, calc(100% - 48px));
            display: flex;
            align-items: center;
        }

        .brand img {
            width: 172px;
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 2px 12px rgba(0,74,156,.22));
        }

        /* HERO */
        .hero {
            height: 100vh;
            min-height: 620px;
            position: relative;
            display: grid;
            align-items: center;
            overflow: hidden;
            isolation: isolate;
            color: #fff;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: -3;
            background: url('assets/gh-main-visual.jpg') center / cover no-repeat;
            animation: heroDrift 10s ease-in-out infinite alternate;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/gh-main-visual-2.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 3s infinite;
        }

        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url('assets/gh-main-visual-3.png') center / cover no-repeat;
            opacity: 0;
            animation: imgCross 9s 6s infinite;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            z-index: -2;
            background:
                linear-gradient(180deg, rgba(0,30,80,.36) 0%, transparent 20%, rgba(4,10,22,.52) 100%),
                linear-gradient(108deg, rgba(4,10,22,.82) 0%, rgba(4,10,22,.60) 40%, rgba(4,10,22,.28) 66%, rgba(4,10,22,.38) 100%);
        }

        .hero-grid {
            position: absolute;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(189,239,255,.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(189,239,255,.06) 1px, transparent 1px),
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
            background-size: 96px 96px, 96px 96px, 24px 24px, 24px 24px;
            mask-image:
                linear-gradient(90deg, transparent 0%, rgba(0,0,0,.55) 14%, rgba(0,0,0,.55) 82%, transparent 100%),
                linear-gradient(180deg, rgba(0,0,0,.4) 0%, rgba(0,0,0,.7) 50%, transparent 100%);
            mask-composite: intersect;
            opacity: .78;
            animation: gridDrift 16s linear infinite;
        }

        .hero-grid::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(189,239,255,.02) 42%, rgba(189,239,255,.18) 50%, rgba(189,239,255,.02) 58%, transparent 100%);
            transform: translateX(-62%);
            animation: scanAcross 5.8s ease-in-out infinite;
        }

        .hero-grid::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 46%, rgba(0,145,218,.14) 50%, transparent 54%);
            opacity: .55;
            transform: translate3d(-18%,-18%,0);
            animation: diagonalSweep 7.2s ease-in-out infinite;
        }

        .hero-inner {
            width: min(1200px, calc(100% - 48px));
            margin: 0 auto;
            padding-top: 72px;
            display: grid;
            grid-template-columns: 1fr 340px;
            align-items: center;
            gap: clamp(48px, 6vw, 96px);
        }

        .hero-copy { max-width: 620px; }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 26px;
            padding: 0 11px 0 7px;
            background: rgba(0,145,218,.13);
            border: 1px solid rgba(0,145,218,.28);
            border-radius: 999px;
            color: rgba(189,239,255,.88);
            font-size: 10.5px;
            font-weight: 750;
            letter-spacing: .08em;
            text-transform: uppercase;
            margin-bottom: 22px;
            animation: riseIn .8s ease both;
        }

        .eyebrow-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--blue-2);
            box-shadow: 0 0 9px rgba(0,145,218,1);
            flex-shrink: 0;
        }

        .hero h1 {
            font-size: clamp(34px, 3.4vw, 58px);
            line-height: 1.14;
            letter-spacing: -.03em;
            font-weight: 850;
            text-wrap: balance;
            animation: riseIn .9s .07s ease both;
        }

        .hero h1 em { font-style: normal; color: #bdefff; text-shadow: 0 0 48px rgba(0,145,218,.28); }

        .hero-desc {
            margin-top: 20px;
            color: rgba(255,255,255,.68);
            font-size: clamp(14px, 1.35vw, 17px);
            line-height: 1.72;
            font-weight: 500;
            animation: riseIn .9s .16s ease both;
        }

        /* ENTRY PANEL */
        .entry-panel { animation: riseIn .9s .24s ease both; position: relative; }

        .ep-card {
            position: relative;
            padding: 22px 24px 20px;
            background: rgba(5,14,28,.58);
            backdrop-filter: blur(36px);
            border: 1px solid rgba(255,255,255,.11);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.07), 0 28px 72px rgba(0,0,0,.54);
        }

        .ep-card::before {
            content: '';
            position: absolute;
            top: 0; left: 18%; right: 18%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(189,239,255,.32), transparent);
        }

        .ep-card::after {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(0,145,218,.14) 0%, transparent 70%);
            pointer-events: none;
        }

        .ep-name { font-size: 20px; font-weight: 800; color: rgba(255,255,255,.95); line-height: 1.28; letter-spacing: -.025em; margin-bottom: 4px; }
        .ep-name-en { font-size: 10.5px; font-weight: 600; color: rgba(189,239,255,.42); letter-spacing: .04em; margin-bottom: 15px; }
        .ep-rule { height: 1px; background: linear-gradient(90deg, rgba(255,255,255,.09) 0%, rgba(255,255,255,.02) 100%); margin-bottom: 14px; }
        .ep-desc { font-size: 12.5px; color: rgba(196,220,248,.58); line-height: 1.72; font-weight: 500; margin-bottom: 18px; }

        .ep-enter {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 50px;
            padding: 0 13px 0 20px;
            background: linear-gradient(118deg, rgba(255,255,255,.075), rgba(255,255,255,.035)), rgba(6,16,30,.44);
            border: 1px solid rgba(189,239,255,.16);
            border-radius: 11px;
            color: rgba(238,247,255,.74);
            font-size: 13.5px;
            font-weight: 750;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 22px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.08);
            opacity: .74;
            transition: transform .22s ease, box-shadow .22s ease, background .22s ease, border-color .22s ease, color .22s ease, opacity .22s ease;
            margin-bottom: 14px;
        }

        .ep-enter:hover, .ep-enter:focus-visible {
            transform: translateY(-2px);
            background: linear-gradient(118deg, rgba(0,74,156,.92) 0%, rgba(0,145,218,.72) 100%), rgba(8,28,52,.72);
            border-color: rgba(189,239,255,.46);
            color: #fff;
            box-shadow: 0 14px 36px rgba(0,145,218,.38), inset 0 1px 0 rgba(255,255,255,.14);
            opacity: 1;
            outline: none;
        }

        .ep-enter:active { transform: translateY(0); }

        .ep-arrow-wrap {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: rgba(255,255,255,.08);
            display: grid;
            place-items: center;
            flex-shrink: 0;
            transition: transform .22s ease, background .22s ease;
        }

        .ep-enter:hover .ep-arrow-wrap { transform: translateX(3px); background: rgba(255,255,255,.16); }

        /* ANIMATIONS */
        @keyframes heroDrift {
            from { transform: scale(1.05) translate3d(0,0,0); }
            to   { transform: scale(1.12) translate3d(-1.4%,.8%,0); }
        }
        @keyframes imgCross {
            0%,28%  { opacity: 0; }
            34%,60% { opacity: 1; }
            66%,100%{ opacity: 0; }
        }
        @keyframes riseIn {
            from { opacity: 0; transform: translateY(22px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes gridDrift {
            from { background-position: 0 0,0 0,0 0,0 0; }
            to   { background-position: 96px 96px,96px 96px,24px 24px,24px 24px; }
        }
        @keyframes scanAcross {
            0%,12%  { transform: translateX(-68%); opacity: 0; }
            28%,62% { opacity: .72; }
            88%,100%{ transform: translateX(68%); opacity: 0; }
        }
        @keyframes diagonalSweep {
            0%,18%  { transform: translate3d(-26%,-26%,0); opacity: 0; }
            44%,70% { opacity: .5; }
            100%    { transform: translate3d(26%,26%,0); opacity: 0; }
        }

        @media (max-width: 920px) {
            .hero-inner { grid-template-columns: 1fr; gap: 28px; align-items: start; padding-top: 100px; }
            .entry-panel { width: min(340px, 100%); }
        }
        @media (max-width: 600px) {
            .brand img { width: 148px; }
            .hero-inner { width: calc(100% - 32px); padding-top: 92px; }
            .hero h1 { font-size: 30px; }
            .entry-panel { width: 100%; }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
        }
        </style>

        <main>
            <section class="hero" aria-labelledby="heroTitle">
                <div class="hero-bg"></div>

                <div class="hero-inner">

                        <h1 id="heroTitle">

                            <em>미래를 만들어가는</em> GH
                        </h1>
                        <p class="hero-desc">재무 의사결정지원 시스템</p>

                    <aside class="entry-panel" aria-label="시스템 입장">
                        <div class="ep-card">
                            <h2 class="ep-name">재무 의사결정 지원 시스템</h2>
                            <p class="ep-name-en">Financial Decision Support System</p>
                            <div class="ep-rule"></div>
                            <p class="ep-desc">중장기 사업계획 기반<br>통합 의사결정 지원 시스템</p>
                            <a class="ep-enter" href="index.html">
                                <span>시스템 입장하기</span>
                                <span class="ep-arrow-wrap" aria-hidden="true">
                                    <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
                                        <path d="M2 7H12M8 3L12 7L8 11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </span>

                        </div>
                    </aside>
                </div>
            </section>
        </main>
    </template>

    <!-- ═══════════════════════════════════════════════════════
         React 앱 마운트 포인트
    ════════════════════════════════════════════════════════ -->
    <div id="root" style="display:none" aria-hidden="true"></div>

    <!-- 랜딩 → 앱 전환 스크립트 -->
    <script>
        (() => {
            const host     = document.getElementById('landing-host');
            const root     = document.getElementById('root');
            const template = document.getElementById('landing-template');
            if (!host || !root || !template) return;

            host.style.cssText = 'position:fixed;inset:0;z-index:9999;display:block;background:#020812;';

            const shadow = host.attachShadow({ mode: 'open' });
            shadow.appendChild(template.content.cloneNode(true));

            const enterSystem = (e) => {
                e.preventDefault();
                host.style.display = 'none';
                root.style.display = 'block';
                root.removeAttribute('aria-hidden');
                document.body.classList.add('app-entered');
            };

            shadow.querySelectorAll('a[href="index.html"], .ep-enter').forEach(el => {
                el.addEventListener('click', enterSystem);
            });
        })();
    </script>

    <!-- ═══════════════════════════════════════════════════════
         React 앱 · v5.0
         현재 단계: 프로젝트 등록/관리 (master_project 단일 테이블)
    ════════════════════════════════════════════════════════ -->
    <script type="text/babel">
    // ── LoginScreen ──────────────────────────────────────────
    function LoginScreen({ onLoginSuccess }) {
        const [email,    setEmail]    = React.useState('');
        const [password, setPassword] = React.useState('');
        const [loading,  setLoading]  = React.useState(false);
        const [error,    setError]    = React.useState('');

        const handleLogin = async (e) => {
            e.preventDefault();
            if (!email || !password) { setError('이메일과 비밀번호를 모두 입력해주세요.'); return; }
            setLoading(true); setError('');
            try {
                const { data, error: authErr } = await window.db.auth.signIn(email.trim(), password);
                if (authErr) throw authErr;
                if (data?.session) { onLoginSuccess(data.session); }
                else throw new Error('세션 발급에 실패했습니다.');
            } catch (err) {
                let msg = err.message || '로그인에 실패했습니다.';
                if (msg.includes('Invalid login credentials')) msg = '이메일 또는 비밀번호가 일치하지 않습니다.';
                else if (msg.includes('Email not confirmed')) msg = '이메일 인증이 완료되지 않았습니다. 관리자에게 문의하세요.';
                setError(msg);
            } finally { setLoading(false); }
        };

        return (
            <div className="login-bg">
                <div className="login-card">
                    <div className="login-head">
                        <div className="login-mark">
                            <div className="login-mark-dot"><img src="assets/gh-header-logo.png" alt="GH CI" /></div>
                            <div className="login-mark-name">GH · 재무 의사결정지원 시스템</div>
                        </div>
                        <div className="login-title">로그인</div>
                        <div className="login-sub">승인된 운영자 계정으로 데이터 파이프라인에 접근합니다</div>
                    </div>
                    <form className="login-body" onSubmit={handleLogin}>
                        {error && <div className="login-err">{error}</div>}
                        <div className="login-field">
                            <label className="login-lbl">이메일</label>
                            <input type="email" className="login-inp" value={email} onChange={e => setEmail(e.target.value)} placeholder="admin@company.local" autoFocus disabled={loading} />
                        </div>
                        <div className="login-field">
                            <label className="login-lbl">비밀번호</label>
                            <input type="password" className="login-inp" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" disabled={loading} />
                        </div>
                        <button type="submit" className="login-btn" disabled={loading}>{loading ? '인증 중...' : '로그인'}</button>
                    </form>
                    <div className="login-footer">Secured by Auth · 승인된 사용자만 접근 가능</div>
                </div>
            </div>
        );
    }
    </script>

            { id: 'project_mgr',    label: '프로젝트 등록 및 관리', icon: 'M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2' },

                        <span className="sb-proj-chevron">

                    ) : (
                        <div className="sb-proj-none">
                            <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
                                <circle cx="6" cy="6" r="4.5" stroke="currentColor" strokeWidth="1.5"/>
                                <path d="M6 4V6.5M6 8H6.01" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                            </svg>
                            선택된 프로젝트 없음
                        </div>
                    )}
                </div>

                <nav className="sb-nav">
                    {NAV.map((g, gi) => (
                        <div key={gi}>
                            <div className="sb-grp">{g.group}</div>
                            {g.items.map(it => (
                                <div key={it.id} className={`sb-item ${appMode === it.id ? 'active' : ''}`} onClick={() => setAppMode(it.id)}>
                                    <svg className="sb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeLinecap="round" strokeLinejoin="round"><path d={it.icon} /></svg>
                                    <span>{it.label}</span>
                                </div>
                            ))}
                        </div>
                    ))}
                </nav>
                <div className="sb-foot">
                    <div className="sb-avatar">{userInitial}</div>
                    <div className="sb-user-meta">
                        <div className="sb-user-name">{userEmail}</div>
                        <div className="sb-user-status">DB 정상</div>
                    </div>
                    <button className="logout-btn" onClick={onLogout}>로그아웃</button>
                </div>
            </aside>
        );
    }
    </script>

    <script type="text/babel">
    // ── ProjectMgr ───────────────────────────────────────────
    function ProjectMgr({ manageList, onRefresh, setStatus }) {
        const [projYear,           setProjYear]           = React.useState(2025);
        const [projHalf,           setProjHalf]           = React.useState('상반기');
        const [projScenarioType,   setProjScenarioType]   = React.useState('기본안');
        const [projScenarioVal,    setProjScenarioVal]    = React.useState('시나리오1');
        const [projScenarioCustom, setProjScenarioCustom] = React.useState('');
        const [projScenarioDesc,   setProjScenarioDesc]   = React.useState('');
        const [isEditModalOpen,    setIsEditModalOpen]    = React.useState(false);
        const [editingProject,     setEditingProject]     = React.useState(null);
        const [editProjDesc,       setEditProjDesc]       = React.useState('');

        const handleCreate = async (e) => {
            e.preventDefault();
            const scenarioName = projScenarioType === '기본안'
                ? '기본안'
                : (projScenarioVal === '직접입력' ? projScenarioCustom.trim() : projScenarioVal);
            if (projScenarioType === '시나리오' && projScenarioVal === '직접입력' && !projScenarioCustom.trim()) {
                setStatus({ type: 'error', message: '시나리오 이름을 직접 입력해 주세요.' }); return;
            }
            const projName = `${projYear}년 ${projHalf} ${scenarioName}`;
            setStatus({ type: 'loading', message: `'${projName}' 프로젝트를 DB에 생성 중...` });
            try {
                await window.db.createProject({ year: parseInt(projYear), half: projHalf, scenario: scenarioName, description: projScenarioType === '시나리오' ? projScenarioDesc : null });
                setStatus({ type: 'success', message: `'${projName}' 프로젝트가 등록되었습니다.` });
                if (projScenarioVal === '직접입력') setProjScenarioCustom('');
                setProjScenarioDesc('');
                setTimeout(onRefresh, 500);
            } catch (err) { setStatus({ type: 'error', message: err.message }); }
        };

        const handleDelete = async (p) => {
            if (!window.confirm(`[경고] '${p.origName}' 프로젝트를 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`)) return;
            setStatus({ type: 'loading', message: `'${p.origName}' 삭제 중...` });
            try {
                await window.db.deleteProject({ year: p.year, half: p.half, scenario: p.scenario });
                setStatus({ type: 'success', message: `'${p.origName}' 삭제 완료.` });
                setTimeout(onRefresh, 500);
            } catch (err) { setStatus({ type: 'error', message: `삭제 실패: ${err.message}` }); }
        };

        const handleEditDesc = async () => {
            if (!editingProject) return;
            setStatus({ type: 'loading', message: '설명 수정 중...' });
            try {
                await window.db.updateProjectDescription({ year: editingProject.year, half: editingProject.half, scenario: editingProject.scenario, description: editProjDesc });
                setStatus({ type: 'success', message: `'${editingProject.scenario}' 설명이 수정되었습니다.` });
                setIsEditModalOpen(false); setEditingProject(null); setEditProjDesc('');
                setTimeout(onRefresh, 500);
            } catch (err) { setStatus({ type: 'error', message: `수정 실패: ${err.message}` }); }
        };

        return (
            <>
                <div className="two-col" style={{ gridTemplateColumns: '4fr 6fr', alignItems: 'start' }}>
                    {/* 생성 폼 */}
                    <div className="panel" style={{ overflow: 'visible' }}>
                        <div className="phd"><div className="pt">새 프로젝트 생성</div></div>
                        <form onSubmit={handleCreate} className="pb" style={{ display: 'flex', flexDirection: 'column', gap: '14px' }}>
                            <div>
                                <label className="login-lbl">연도 선택 (2025 ~ 2030년)</label>
                                <div className="year-btn-grid">
                                    {[2025, 2026, 2027, 2028, 2029, 2030].map(y => (
                                        <button key={y} type="button" className={`year-btn ${projYear === y ? 'active' : ''}`} onClick={() => setProjYear(y)}>
                                            <span>{y}년</span><span className="year-btn-sub">Target Year</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="login-lbl">반기 선택</label>
                                <div className="segmented-control">
                                    {['상반기','하반기'].map(h => (<button key={h} type="button" className={`seg-btn ${projHalf === h ? 'active' : ''}`} onClick={() => setProjHalf(h)}>{h}</button>))}
                                </div>
                            </div>
                            <div>
                                <label className="login-lbl">안 구분</label>
                                <div className="segmented-control">
                                    <button type="button" className={`seg-btn ${projScenarioType === '기본안' ? 'active' : ''}`} onClick={() => { setProjScenarioType('기본안'); setProjScenarioDesc(''); }}>기본안</button>
                                    <button type="button" className={`seg-btn ${projScenarioType === '시나리오' ? 'active' : ''}`} onClick={() => setProjScenarioType('시나리오')}>시나리오 지정</button>
                                </div>
                            </div>
                            {projScenarioType === '시나리오' && (
                                <div>
                                    <label className="login-lbl">시나리오 구분</label>
                                    <div style={{ display: 'flex', gap: '8px' }}>
                                        <select className="popt-inp" style={{ flex: 1, minWidth: '100px' }} value={projScenarioVal} onChange={e => setProjScenarioVal(e.target.value)}>
                                            {['시나리오1','시나리오2','시나리오3','시나리오4','직접입력'].map(v => (<option key={v} value={v}>{v === '직접입력' ? '직접 입력' : v}</option>))}
                                        </select>
                                        {projScenarioVal === '직접입력' && (
                                            <input type="text" className="popt-inp" style={{ flex: 1.5 }} value={projScenarioCustom} onChange={e => setProjScenarioCustom(e.target.value)} placeholder="예: 시나리오5" />
                                        )}
                                    </div>
                                </div>
                            )}
                            <div>
                                <label className="login-lbl">시나리오 설명</label>
                                <textarea className="popt-inp" style={{ width: '100%', height: '70px', resize: 'none' }} value={projScenarioDesc} onChange={e => setProjScenarioDesc(e.target.value)}
                                    placeholder={projScenarioType === '기본안' ? '기본안은 설명이 필요하지 않습니다.' : '시나리오 상세 설명을 입력하세요.'} disabled={projScenarioType === '기본안'} />
                            </div>
                            <button type="submit" className="tbtn acc" style={{ width: '100%', height: '40px', justifyContent: 'center', marginTop: '6px' }}>프로젝트 생성하기</button>
                        </form>
                    </div>

                    {/* 프로젝트 목록 */}
                    <div className="panel" style={{ display: 'flex', flexDirection: 'column', minHeight: '520px' }}>
                        <div className="phd"><div className="pt">마스터 프로젝트 목록</div></div>
                        <div className="pb" style={{ flex: 1, overflow: 'auto', padding: '15px' }}>
                            {manageList.length === 0 ? (
                                <div style={{ color: 'var(--text4)', textAlign: 'center', padding: '40px 0' }}>등록된 마스터 프로젝트가 없습니다.</div>
                            ) : (
                                <div style={{ overflowX: 'auto' }}>
                                    <table className="proj-table">
                                        <thead><tr><th>연도</th><th>반기</th><th>시나리오</th><th>설명</th><th style={{textAlign:'center'}}>관리</th></tr></thead>
                                        <tbody>
                                            {manageList.map(p => (
                                                <tr key={p.origName}>
                                                    <td style={{ fontWeight: 600 }}>{p.year}년</td>
                                                    <td>{p.half}</td>
                                                    <td style={{ color: 'var(--acc)', fontWeight: 600 }}>{p.scenario}</td>
                                                    <td style={{ whiteSpace: 'normal', wordBreak: 'break-all', color: 'var(--text3)', fontSize: '11.5px', maxWidth: '200px' }}>{p.description || '-'}</td>
                                                    <td style={{ textAlign: 'center' }}>
                                                        <div style={{ display: 'flex', gap: '4px', justifyContent: 'center' }}>
                                                            <button className="tbtn" style={{ height: '24px', padding: '1px 8px', fontSize: '11px' }} onClick={() => { setEditingProject(p); setEditProjDesc(p.description || ''); setIsEditModalOpen(true); }}>수정</button>
                                                            <button className="tbtn danger" style={{ height: '24px', padding: '1px 8px', fontSize: '11px' }} onClick={() => handleDelete(p)}>삭제</button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </div>
                </div>

                {/* 설명 수정 모달 */}
                {isEditModalOpen && editingProject && (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <div className="modal-head">
                                <div className="modal-title">프로젝트 설명 수정</div>
                                <button className="modal-close" onClick={() => { setIsEditModalOpen(false); setEditingProject(null); setEditProjDesc(''); }}>×</button>
                            </div>
                            <div className="modal-body">
                                <div style={{ fontSize: '11.5px', color: 'var(--text3)' }}>대상: <b>{editingProject.year}년 {editingProject.half} {editingProject.scenario}</b></div>
                                <div>
                                    <label className="login-lbl">시나리오 설명</label>
                                    <textarea className="popt-inp" style={{ width: '100%', height: '80px', resize: 'none', fontSize: '12px' }} value={editProjDesc} onChange={e => setEditProjDesc(e.target.value)} placeholder="수정할 설명을 입력하세요." />
                                </div>
                            </div>
                            <div className="modal-foot">
                                <button className="tbtn" onClick={() => { setIsEditModalOpen(false); setEditingProject(null); setEditProjDesc(''); }}>취소</button>
                                <button className="tbtn acc" onClick={handleEditDesc}>저장</button>
                            </div>
                        </div>
                    </div>
                )}
            </>
        );
    }
    </script>

    <script type="text/babel">
    </script>

    <script type="text/babel">
    // ── Stub (준비중 화면) ───────────────────────────────────
    const STUB_META = {
        biz_master_mgr: { title: '사업마스터관리',  desc: '전체 사업 마스터 데이터의 통합 편집·분류·이관 기능입니다.' },
        excel_upload:   { title: '엑셀 업로드',     desc: '엑셀 파일을 파싱해 DB 테이블로 자동 이관합니다.' },
        settings_mgr:   { title: '시스템 설정',     desc: 'DB 연결 정보, 사용자 권한, 알림 설정 등을 관리합니다.' },
    };
    function StubPage({ mode }) {
        const meta = STUB_META[mode] || { title: '준비중인 화면', desc: '이 기능은 현재 개발 준비 중입니다.' };
        return (
            <div className="panel" style={{ padding: '60px 40px', textAlign: 'center', background: '#fff' }}>
                <div style={{ fontSize: '48px', marginBottom: '16px' }}>🚧</div>
                <h2 style={{ fontSize: '18px', fontWeight: 700, color: 'var(--text)', marginBottom: '8px' }}>{meta.title}</h2>
                <p style={{ color: 'var(--text3)', fontSize: '13px', maxWidth: '360px', margin: '0 auto', lineHeight: 1.7 }}>{meta.desc}</p>
                <p style={{ color: 'var(--text4)', fontSize: '11.5px', marginTop: '20px' }}>설계 중 · 준비중</p>
            </div>
        );
    }

    // ── App ──────────────────────────────────────────────────
    const STUB_MODES = new Set(['biz_master_mgr', 'excel_upload', 'settings_mgr']);
    const PAGE_LABEL = {
        project_mgr:    { eyebrow: 'Project Management', title: '프로젝트 등록 및 관리' },
        biz_master_mgr: { eyebrow: 'Business Master',    title: '사업마스터관리' },
        excel_upload:   { eyebrow: 'Excel Upload',        title: '엑셀 업로드' },
        settings_mgr:   { eyebrow: 'Settings',            title: '설정' },
    };

    function MainApp({ session, onLogout }) {
        const [appMode,          setAppMode]          = React.useState('project_mgr');
        const [status,           setStatus]           = React.useState(null);
        const [manageList,       setManageList]       = React.useState([]);
        const [nowTime,          setNowTime]          = React.useState('');
        const [selectedProject,  setSelectedProject]  = React.useState(null);

        React.useEffect(() => {
            const t = setInterval(() => setNowTime(new Date().toLocaleString('ko-KR', { hour12: false })), 1000);
            return () => clearInterval(t);
        }, []);

        const loadData = React.useCallback(async () => {
            setStatus({ type: 'loading', message: '프로젝트 목록 동기화 중...' });
            try {
                const rows = await window.db.getProjects();
                const list = (rows || []).map(m => ({
                    origName:    `${m.year}년 ${m.half} ${m.scenario}`,
                    year:        m.year,
                    half:        m.half,
                    scenario:    m.scenario,
                    description: m.description,
                }));
                list.sort((a, b) => {
                    if (a.year !== b.year) return a.year - b.year;
                    if (a.half !== b.half) return a.half === '상반기' ? -1 : 1;
                    return a.scenario.localeCompare(b.scenario, 'ko');
                });
                setManageList(list);
                setStatus(null);
            } catch (e) { setStatus({ type: 'error', message: '데이터 로드 오류: ' + e.message }); }
        }, []);

        React.useEffect(() => { loadData(); }, []);

        const userEmail = session?.user?.email || '운영자';
        const pageLabel = PAGE_LABEL[appMode] || { eyebrow: 'System', title: appMode };

        return (
            <div className="shell">
                <Sidebar appMode={appMode} setAppMode={(m) => { setAppMode(m); setStatus(null); }} onLogout={onLogout} userEmail={userEmail} projectList={manageList} selectedProject={selectedProject} setSelectedProject={setSelectedProject} />
                <div className="main">
                    <div className="topbar">
                        <div className="tb-title">
                            <div className="tb-eyebrow">{pageLabel.eyebrow}</div>
                            <div className="tb-pagename">{pageLabel.title}</div>
                        </div>
                        <div className="tb-meta">
                            {appMode === 'project_mgr' && (
                                <div className="tb-sec">
                                    <span className="tb-lbl">총 <b>{manageList.length}</b>개 프로젝트 등록됨</span>
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="view-hd">
                        <div className="vt">{pageLabel.eyebrow.toUpperCase()}</div>
                    </div>
                    <div className="vbody">
                        {status && (
                            <div className={`alert-box alert-${status.type}`}>
                                <b>{{ error:'오류', success:'완료', loading:'진행' }[status.type] || ''}</b>
                                <span>{status.message}</span>
                            </div>
                        )}
                        {appMode === 'project_mgr' && <ProjectMgr manageList={manageList} onRefresh={loadData} setStatus={setStatus} />}
                        {STUB_MODES.has(appMode) && <StubPage mode={appMode} />}
                    </div>
                    <div className="stbar">
                        <div className="sti">DB <b>master_project</b></div>
                        <div className="stsep"></div>
                        <div className="sti"><b style={{color:'var(--green)'}}>● Auth Active</b></div>
                        <div style={{flex:1}}></div>
                        <div className="sti">{nowTime}</div>
                        <div className="stsep"></div>
                        <div className="sti">GH · v5.0</div>
                    </div>
                </div>
            </div>
        );
    }

    function App() {
        const [session,  setSession]  = React.useState(null);
        const [checking, setChecking] = React.useState(true);

        React.useEffect(() => {
            window.db.auth.getSession().then(({ data: { session: s } }) => { setSession(s); setChecking(false); });
            const { data: { subscription } } = window.db.auth.onAuthStateChange((_, s) => { setSession(s); });
            return () => subscription.unsubscribe();
        }, []);

        const handleLogout = async () => {
            if (!window.confirm('로그아웃 하시겠습니까?')) return;
            await window.db.auth.signOut();
            setSession(null);
        };

        if (checking) return <div className="login-bg"><div style={{color:'#cbd5e1',fontSize:'13px'}}>세션 확인 중...</div></div>;
        if (!session) return <LoginScreen onLoginSuccess={setSession} />;
        return <MainApp session={session} onLogout={handleLogout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
