                                            <div className="phd"><div className="pt">다중 엑셀 시트 동시 파싱</div></div>
                                            <div className="pb" style={{ padding: '20px 10px' }}>
                                                <div className={`dropzone ${isDragging ? 'dragover' : ''}`} onDragOver={handleDragOver} onDragLeave={handleDragLeave} onDrop={handleDrop} onClick={() => fileInputRef.current.click()}>
                                                    <div className="dz-icon">
                                                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                                    </div>
                                                    <div className="dz-title">{selectedFile ? selectedFile.name : '엑셀 파일을 끌어다 놓거나 클릭해 선택'}</div>
                                                    <div className="dz-sub">.xlsx · 다중 시트 자동 파싱 지원</div>
                                                </div>
                                                <input type="file" style={{ display: 'none' }} ref={fileInputRef} accept=".xlsx" onChange={(e) => { if (e.target.files[0]) setSelectedFile(e.target.files[0]) }} />

                                                {logs.length > 0 && (
                                                    <div className="log-console">
                                                        {logs.map((L, i) => <div key={i}>{L}</div>)}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </>
                                )}

                                {appMode === 'view' && viewData.length > 0 && (
                                    <div className="panel"><div className="phd"><div className="pt">DB 조회결과 (엑셀 원본 스타일 복구)</div></div>
                                        <div className="pb0">
                                            <div className="grid-wrap" style={{ maxHeight: '500px' }}>
                                                <table className="dgrid">
                                                    <thead>
                                                        <tr>
                                                            <th>세부 항목명</th>
                                                            {viewYears.map(y => <th key={y}>{y}</th>)}
                                                            <th>총계</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {viewData.map((row, i) => (
                                                            <tr key={i}>
                                                                <td>{row.detailItem}</td>
                                                                {viewYears.map(y => <td key={y} className={row.yearData[y] < 0 ? 'neg' : ''}>{formatAmount(row.yearData[y])}</td>)}
                                                                <td className={`tot ${row.total < 0 ? 'neg' : ''}`}>{formatAmount(row.total)}</td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div></div>
                                )}

                                {appMode === 'report' && reportData.length > 0 && (
                                    <>
                                        {reportStats && (
                                            <div className="stat-row" style={{ gridTemplateColumns: 'repeat(5, 1fr)' }}>
                                                <div className="scard b">
                                                    <div className="sl">NPV (할인율 4.5%)</div>
                                                    <div><span className="sv">{formatAmount(reportStats.npv)}</span><span className="su">{amountUnit}</span></div>
                                                    <div className="ss">최초 투자연도 기준</div>
                                                </div>
                                                <div className="scard t">
                                                    <div className="sl">IRR (내부수익률)</div>
                                                    <div><span className="sv">{(reportStats.irr * 100).toFixed(2)}</span><span className="su">%</span></div>
                                                    <div className="ss">현금흐름 근사 추정치</div>
                                                </div>
                                                <div className="scard g">
                                                    <div className="sl">총 투자 (용지+조성)</div>
                                                    <div><span className="sv">{formatAmount(reportStats.totalInv)}</span><span className="su">{amountUnit}</span></div>
                                                    <div className="ss">집행 예상/실적 총계</div>
                                                </div>
                                                <div className="scard o">
                                                    <div className="sl">총 공급</div>
                                                    <div><span className="sv">{formatAmount(reportStats.totalSup)}</span><span className="su">{amountUnit}</span></div>
                                                    <div className="ss">분양/공급 계획 총계</div>
                                                </div>
                                                <div className="scard" style={{ borderTopColor: '#6a1b9a' }}>
                                                    <div className="sl">총 회수</div>
                                                    <div><span className="sv">{formatAmount(reportStats.totalRec)}</span><span className="su">{amountUnit}</span></div>
                                                    <div className="ss">실 회수 실적 총계</div>
                                                </div>
                                            </div>
                                        )}
                                        <div className="panel" style={{ height: '300px', display: 'flex', flexDirection: 'column' }}>
                                            <div className="phd" style={{ flexShrink: 0 }}><div className="pt">투자/회수 추이 차트</div></div>
                                            <div className="chart-contain" style={{ padding: '10px' }}><canvas ref={chartCanvasRef}></canvas></div>
                                        </div>

                                        <div className="panel"><div className="phd"><div className="pt">집행/회수 테이블 요약</div></div>
                                            <div className="pb0">
                                                <div className="grid-wrap" style={{ maxHeight: '350px' }}>
                                                    <table className="dgrid">
                                                        <thead>
                                                            <tr>
                                                                <th>귀속 연도</th>
                                                                <th>투입액 (용지/조성)</th>
                                                                <th>회수액</th>
                                                                <th>당해년 NCF (순흐름)</th>
                                                                <th>누적 자금수지</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {reportData.map((r, i) => (
                                                                <tr key={i}>
                                                                    <td style={{ textAlign: 'center' }}>{r.year}년</td>
                                                                    <td className="neg">{formatAmount(r.investment)}</td>
                                                                    <td className="pos">{formatAmount(r.recovery)}</td>
                                                                    <td className={r.netFlow >= 0 ? 'pos' : 'neg'} style={{ background: 'var(--panel-2)' }}>{formatAmount(r.netFlow)}</td>
                                                                    <td className={r.cumulative >= 0 ? 'pos' : 'neg'} style={{ background: 'var(--acc-lt)', fontWeight: 700 }}>{formatAmount(r.cumulative)}</td>
                                                                </tr>
                                                            ))}
                                                            <tr className="tot">
                                                                <td style={{ textAlign: 'center' }}>총계 실적</td>
                                                                <td className="neg">{formatAmount(reportData.reduce((s, x) => s + x.investment, 0))}</td>
                                                                <td className="pos">{formatAmount(reportData.reduce((s, x) => s + x.recovery, 0))}</td>
                                                                <td className={reportData.reduce((s, x) => s + x.netFlow, 0) >= 0 ? 'pos' : 'neg'}>{formatAmount(reportData.reduce((s, x) => s + x.netFlow, 0))}</td>
                                                                <td>-</td>
                                                            </tr>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div></div>
                                    </>
                                )}

                                {appMode === 'financial_outlook' && (() => {
                                    const { years, rows } = getOutlookData();
                                    return (
                                        <div className="panel">
                                            <div className="phd">
                                                <div className="pt">중장기 재무전망 (선택 사업 기준 10개년 흐름)</div>
                                                <div style={{ fontSize: '11px', color: 'var(--text3)' }}>단위: {amountUnit}</div>
                                            </div>
                                            <div className="pb0">
                                                <div className="grid-wrap" style={{ overflowX: 'auto' }}>
                                                    <table className="dgrid" style={{ minWidth: '1000px' }}>
                                                        <thead>
                                                            <tr>
                                                                <th style={{ minWidth: '220px', textAlign: 'left', position: 'sticky', left: 0, zIndex: 10, background: 'var(--panel-2)', borderRight: '1px solid var(--border)' }}>구분 (Financial Line Items)</th>
                                                                {years.map(y => <th key={y} style={{ textAlign: 'right' }}>{y}년</th>)}
                                                                <th style={{ textAlign: 'right', fontWeight: 'bold' }}>10개년 합계</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {rows.map((row, idx) => {
                                                                let trClass = '';
                                                                if (row.type === 'subtotal') trClass = 'sub';
                                                                if (row.type === 'cumulative') trClass = 'tot';
                                                                if (row.type === 'ncf') trClass = 'tot';

                                                                const rowSum = row.data.reduce((s, v) => s + v, 0);

                                                                return (
                                                                    <tr key={idx} className={trClass}>
                                                                        <td style={{ 
                                                                            textAlign: 'left', 
                                                                            position: 'sticky', 
                                                                            left: 0, 
                                                                            zIndex: 4, 
                                                                            background: trClass === 'tot' ? 'var(--acc-lt)' : trClass === 'sub' ? 'var(--panel-2)' : '#fff',
                                                                            fontWeight: trClass ? '700' : 'normal',
                                                                            borderRight: '1px solid var(--border)'
                                                                        }}>
                                                                            {row.label}
                                                                        </td>
                                                                        {row.data.map((val, i) => {
                                                                            let tdClass = val < 0 ? 'neg' : '';
                                                                            return (
                                                                                <td key={i} className={tdClass}>
                                                                                    {formatAmount(val)}
                                                                                </td>
                                                                            );
                                                                        })}
                                                                        <td className={rowSum < 0 ? 'neg' : ''} style={{ fontWeight: 'bold' }}>
                                                                            {row.type === 'cumulative' ? '-' : formatAmount(rowSum)}
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })()}

                                {/* ========================================================================= */}
                                {/* END OF LEGACY PAGES RENDER CODE                                          */}
                                {/* ========================================================================= */}
                            </div>

                            <div className="stbar">
                                <div className="sti">탭 <b style={{ color: 'var(--acc)' }}>{appMode.toUpperCase()}</b></div>
                                <div className="stsep"></div>
                                <div className="sti">대상 DB <b>master_project + 4 tables</b></div>
                                <div className="stsep"></div>
                                <div className="sti"><b style={{ color: 'var(--green)' }}>● Auth Active</b></div>
                                <div style={{ flex: 1 }}></div>
                                <div className="sti">GH Parser · v3.5</div>
                            </div>

                            {/* 설명 수정 모달 팝업 */}
                            {isEditModalOpen && editingProject && (
                                <div className="modal-overlay">
                                    <div className="modal-box">
                                        <div className="modal-head">
                                            <div className="modal-title">프로젝트 설명 수정</div>
                                            <button className="modal-close" onClick={() => {
                                                setIsEditModalOpen(false);
                                                setEditingProject(null);
                                                setEditProjDesc('');
                                            }}>×</button>
                                        </div>
                                        <div className="modal-body">
                                            <div style={{ fontSize: '11.5px', color: 'var(--text3)', marginBottom: '8px' }}>
                                                대상 프로젝트: <b>{editingProject.year}년 {editingProject.half} {editingProject.scenario}</b>
                                            </div>
                                            <div>
                                                <label className="login-lbl" style={{ marginBottom: '6px' }}>시나리오 설명</label>
                                                <textarea
                                                    className="popt-inp"
                                                    style={{ width: '100%', height: '80px', resize: 'none', fontSize: '12px' }}
                                                    value={editProjDesc}
                                                    onChange={e => setEditProjDesc(e.target.value)}
                                                    placeholder="수정할 설명을 입력하세요."
                                                />
                                            </div>
                                        </div>
                                        <div className="modal-foot">
                                            <button className="tbtn" onClick={() => {
                                                setIsEditModalOpen(false);
                                                setEditingProject(null);
                                                setEditProjDesc('');
                                            }}>취소</button>
                                            <button className="tbtn acc" onClick={updateMasterDescription}>저장</button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
            );
        }


        // =====================================================================
        // ✅ 루트 컴포넌트: 세션 상태에 따라 로그인화면 vs 메인앱 스위칭
        // =====================================================================
        function App() {
            const [session, setSession] = useState(null);
            const [checking, setChecking] = useState(true);

            // 앱 시작 시 기존 세션 확인 (새로고침 시 자동 로그인 복원)
            useEffect(() => {
                sbClient.auth.getSession().then(({ data: { session: existingSession } }) => {
                    setSession(existingSession);
                    setChecking(false);
                });

                // 세션 변화 감지 (로그아웃, 토큰 만료 등)
                const { data: { subscription } } = sbClient.auth.onAuthStateChange((event, newSession) => {
                    setSession(newSession);
                });

                return () => subscription.unsubscribe();
            }, []);

            const handleLogout = async () => {
                if (!window.confirm('로그아웃 하시겠습니까?')) return;
                await sbClient.auth.signOut();
                setSession(null);
            };

            // 세션 확인 중 (깜빡임 방지)
            if (checking) {
                return (
                    <div className="login-bg">
                        <div style={{ color: '#cbd5e1', fontSize: '13px', fontFamily: 'var(--sans)', letterSpacing: '0.02em' }}>세션 확인 중...</div>
                    </div>
                );
            }

            // 로그인 안된 상태 → 로그인 화면
            if (!session) {
                return <LoginScreen onLoginSuccess={setSession} />;
            }

            // 로그인 된 상태 → 메인 앱
            return <MainApp session={session} onLogout={handleLogout} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
