<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gotham Grid Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090d;
      --panel-bg: rgba(9, 13, 20, 0.76);
      --panel-line: rgba(168, 190, 224, 0.24);
      --panel-hot: rgba(199, 221, 255, 0.62);
      --text: rgba(231, 238, 250, 0.96);
      --muted: rgba(175, 192, 220, 0.72);
      --faint: rgba(128, 145, 176, 0.54);
      --accent: #b7d5ff;
      --amber: #d7b66d;
      --green: #88d6b0;
      --red: #dc8d8a;
      color-scheme: dark;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(130deg, rgba(21, 28, 39, 0.82), transparent 38%),
        radial-gradient(circle at 50% 42%, #18202d 0%, #0b1018 52%, #05070b 100%);
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    button, input { font: inherit; }
    canvas { display: block; }

    .shell {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      border: 1px solid var(--panel-line);
      background: var(--panel-bg);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.54), inset 0 0 36px rgba(167, 190, 224, 0.06);
      backdrop-filter: blur(12px);
    }

    .hud {
      position: absolute;
      top: 22px;
      left: 22px;
      width: min(348px, calc(100vw - 44px));
      border-radius: 12px;
      padding: 16px;
    }

    .brand {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.24em;
      color: var(--faint);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    h1 {
      font-family: "Orbitron", "Rajdhani", "Eurostile", sans-serif;
      font-size: 18px;
      line-height: 1.05;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .live-chip {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      min-width: 52px;
      height: 26px;
      border: 1px solid rgba(136, 214, 176, 0.46);
      border-radius: 999px;
      color: var(--green);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: rgba(93, 169, 129, 0.1);
    }

    .menu {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
    }

    .menu button,
    .control-row button,
    .case-filter button {
      border: 1px solid rgba(148, 171, 209, 0.23);
      border-radius: 8px;
      background: rgba(14, 20, 31, 0.78);
      color: var(--muted);
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, color 160ms ease;
    }

    .menu button {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 8px 10px;
      text-align: left;
    }

    .menu button:hover,
    .control-row button:hover,
    .case-filter button:hover {
      color: var(--text);
      border-color: rgba(197, 218, 251, 0.56);
      background: rgba(24, 33, 49, 0.86);
      transform: translateY(-1px);
    }

    .menu button.is-active,
    .case-filter button.is-active {
      color: #f2f7ff;
      border-color: var(--panel-hot);
      background: linear-gradient(96deg, rgba(84, 109, 144, 0.48), rgba(19, 27, 41, 0.92));
      box-shadow: inset 0 0 18px rgba(184, 207, 241, 0.14);
    }

    .menu button.is-color {
      border-color: rgba(255, 203, 113, 0.44);
      background:
        linear-gradient(135deg, rgba(255, 92, 138, 0.23), rgba(120, 98, 255, 0.18) 48%, rgba(48, 218, 188, 0.2)),
        rgba(14, 20, 31, 0.82);
    }

    .menu button.is-color .menu__icon {
      color: #fff4c7;
      border-color: rgba(255, 229, 155, 0.58);
      background: radial-gradient(circle at 28% 20%, rgba(255,255,255,0.8), rgba(255, 98, 146, 0.54) 34%, rgba(74, 209, 224, 0.34));
      box-shadow: 0 0 20px rgba(255, 104, 166, 0.24);
    }

    .menu button.is-color .menu__stat { color: #ffe08c; }

    .menu button.is-color.is-active {
      border-color: rgba(255, 225, 147, 0.86);
      background:
        linear-gradient(110deg, rgba(255, 86, 136, 0.48), rgba(111, 102, 255, 0.42) 50%, rgba(55, 221, 190, 0.42)),
        rgba(16, 22, 33, 0.88);
      box-shadow: inset 0 0 24px rgba(255, 224, 140, 0.16), 0 0 34px rgba(255, 97, 153, 0.14);
    }

    .menu__icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(181, 204, 239, 0.22);
      border-radius: 7px;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.02em;
    }

    .menu__label {
      display: block;
      font-family: "Orbitron", "Rajdhani", sans-serif;
      font-size: 12px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .menu__desc {
      display: block;
      font-size: 11px;
      color: var(--faint);
      letter-spacing: 0.02em;
    }

    .menu__stat { font-size: 11px; color: var(--accent); }

    .meter {
      border-top: 1px solid rgba(160, 181, 214, 0.14);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .meter__line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
    }

    .meter__bar {
      height: 5px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(115, 135, 170, 0.2);
    }

    .meter__bar span {
      display: block;
      width: 72%;
      height: 100%;
      background: linear-gradient(90deg, var(--green), var(--accent), var(--amber));
    }

    .sidecar {
      position: absolute;
      top: 22px;
      right: 22px;
      width: min(310px, calc(100vw - 44px));
      border-radius: 12px;
      padding: 15px;
      transform: translateX(0);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .sidecar.is-hidden,
    .case-dock.is-hidden,
    .transit-dock.is-hidden,
    .module-dock.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .sidecar.is-hidden { transform: translateX(16px); }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .control-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .control-row button {
      min-height: 36px;
      padding: 0 8px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .control-row button.is-active {
      color: var(--text);
      border-color: var(--panel-hot);
      background: rgba(76, 100, 133, 0.42);
    }

    .readouts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .readout,
    .module-card {
      border: 1px solid rgba(151, 174, 213, 0.16);
      border-radius: 8px;
      padding: 10px;
      background: rgba(11, 16, 25, 0.58);
    }

    .readout { min-height: 70px; }

    .readout span,
    .module-card span {
      display: block;
      color: var(--faint);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .readout strong { display: block; font-size: 20px; letter-spacing: 0.02em; }

    .case-dock,
    .transit-dock,
    .module-dock {
      position: absolute;
      left: 50%;
      bottom: 26px;
      width: min(820px, calc(100vw - 44px));
      transform: translateX(-50%);
      border-radius: 12px;
      padding: 14px;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .case-dock.is-hidden,
    .transit-dock.is-hidden,
    .module-dock.is-hidden { transform: translateX(-50%) translateY(18px); }

    .case-toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .case-search {
      height: 38px;
      width: 100%;
      border: 1px solid rgba(157, 181, 219, 0.24);
      border-radius: 8px;
      padding: 0 12px;
      background: rgba(10, 15, 23, 0.72);
      color: var(--text);
      outline: none;
    }

    .case-search:focus {
      border-color: rgba(199, 221, 255, 0.66);
      box-shadow: 0 0 0 3px rgba(183, 213, 255, 0.1);
    }

    .case-filter { display: flex; gap: 8px; }

    .case-filter button {
      height: 38px;
      padding: 0 12px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .cases,
    .module-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .case-card {
      min-height: 118px;
      border: 1px solid rgba(151, 174, 213, 0.17);
      border-radius: 8px;
      padding: 12px;
      background: rgba(10, 15, 23, 0.66);
    }

    .case-card strong { display: block; margin-bottom: 8px; font-size: 13px; letter-spacing: 0.04em; }
    .case-card p { min-height: 34px; color: var(--muted); font-size: 12px; line-height: 1.45; margin-bottom: 10px; }

    .case-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--faint);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-open { color: var(--green); }
    .status-watch { color: var(--amber); }
    .status-critical { color: var(--red); }

    .transit-dock {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 16px;
      align-items: stretch;
    }

    .route-list { display: grid; gap: 9px; align-content: start; }

    .route {
      border: 1px solid rgba(151, 174, 213, 0.17);
      border-radius: 8px;
      padding: 11px;
      background: rgba(10, 15, 23, 0.66);
    }

    .route strong { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 7px; font-size: 13px; }
    .route span { color: var(--muted); font-size: 12px; }

    .route-map {
      position: relative;
      min-height: 208px;
      border: 1px solid rgba(151, 174, 213, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(rgba(151, 174, 213, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(151, 174, 213, 0.08) 1px, transparent 1px),
        rgba(8, 13, 21, 0.7);
      background-size: 34px 34px;
    }

    .rail { position: absolute; left: 12%; right: 12%; height: 2px; background: rgba(183, 213, 255, 0.48); }
    .rail:nth-child(1) { top: 30%; transform: rotate(-8deg); }
    .rail:nth-child(2) { top: 54%; transform: rotate(7deg); }
    .rail:nth-child(3) { top: 73%; transform: rotate(-2deg); }

    .train {
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid rgba(238, 246, 255, 0.82);
      background: var(--accent);
      box-shadow: 0 0 20px rgba(183, 213, 255, 0.74);
      animation: travel 5.8s linear infinite;
    }

    .train.one { top: 26%; animation-delay: -1.2s; }
    .train.two { top: 50%; animation-delay: -3s; background: var(--amber); }
    .train.three { top: 69%; animation-delay: -4.5s; background: var(--green); }

    .module-card strong {
      display: block;
      font-size: 15px;
      letter-spacing: 0.03em;
      margin-bottom: 8px;
    }

    .module-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .module-dock.is-bloom {
      border-color: rgba(255, 212, 133, 0.4);
      background:
        linear-gradient(128deg, rgba(255, 78, 142, 0.16), rgba(87, 115, 255, 0.11) 48%, rgba(44, 218, 186, 0.15)),
        var(--panel-bg);
    }

    @keyframes travel { from { left: 10%; } to { left: 86%; } }

    .footer {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 18px;
      display: flex;
      justify-content: space-between;
      gap: 18px;
      color: rgba(170, 188, 216, 0.54);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
    }

    @media (max-width: 880px) {
      body { overflow: auto; }
      canvas { position: fixed; inset: 0; }
      .shell { position: relative; min-height: 100vh; display: grid; gap: 14px; padding: 14px; }
      .hud, .sidecar, .case-dock, .transit-dock, .module-dock, .footer {
        position: relative;
        inset: auto;
        width: 100%;
        transform: none;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
      }
      .case-dock.is-hidden, .transit-dock.is-hidden, .sidecar.is-hidden, .module-dock.is-hidden { display: none; }
      .cases, .module-grid { grid-template-columns: 1fr; }
      .transit-dock { grid-template-columns: 1fr; }
      .case-toolbar { grid-template-columns: 1fr; }
      .case-filter { flex-wrap: wrap; }
      .footer { padding: 0 2px 14px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <main class="shell" aria-label="Gotham terminal interface">
    <aside class="hud panel">
      <div class="brand">
        <div>
          <div class="eyebrow">district interface</div>
          <h1>Wayne Terminal</h1>
        </div>
        <div class="live-chip">Live</div>
      </div>
      <nav class="menu" id="menu" aria-label="Terminal modules"></nav>
      <div class="meter">
        <div class="meter__line"><span>Signal integrity</span><strong id="signalValue">72%</strong></div>
        <div class="meter__bar"><span id="signalBar"></span></div>
      </div>
    </aside>

    <section class="sidecar panel" id="clockPanel" aria-label="Clock controls">
      <div class="panel-title"><span>chrono controls</span><span id="zoneLabel">local</span></div>
      <div class="control-row">
        <button type="button" id="modeToggle">24 Hour</button>
        <button type="button" id="secondsToggle" class="is-active">Seconds</button>
        <button type="button" id="scanToggle" class="is-active">Scan</button>
      </div>
      <div class="readouts">
        <div class="readout"><span>Sunrise</span><strong>06:18</strong></div>
        <div class="readout"><span>Patrol</span><strong id="patrolCount">08</strong></div>
        <div class="readout"><span>Latency</span><strong id="latency">12ms</strong></div>
        <div class="readout"><span>Phase</span><strong id="phase">Night</strong></div>
      </div>
    </section>

    <section class="case-dock panel is-hidden" id="caseDock" aria-label="Caseboard">
      <div class="case-toolbar">
        <input class="case-search" id="caseSearch" type="search" placeholder="Search caseboard" />
        <div class="case-filter" id="caseFilter"></div>
      </div>
      <div class="cases" id="caseList"></div>
    </section>

    <section class="transit-dock panel is-hidden" id="transitDock" aria-label="Transit monitor">
      <div class="route-list" id="routeList"></div>
      <div class="route-map" aria-hidden="true">
        <div class="rail"></div>
        <div class="rail"></div>
        <div class="rail"></div>
        <div class="train one"></div>
        <div class="train two"></div>
        <div class="train three"></div>
      </div>
    </section>

    <section class="module-dock panel is-hidden" id="moduleDock" aria-label="Module detail">
      <div class="panel-title"><span id="moduleTitle">module</span><span id="moduleStatus">online</span></div>
      <div class="module-grid" id="moduleGrid"></div>
    </section>

    <div class="footer">
      <span id="footerLeft">Gotham Grid Clock</span>
      <span id="footerRight">Click modules to switch views</span>
    </div>
  </main>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const menu = document.getElementById('menu');
const clockPanel = document.getElementById('clockPanel');
const caseDock = document.getElementById('caseDock');
const transitDock = document.getElementById('transitDock');
const moduleDock = document.getElementById('moduleDock');
const moduleTitle = document.getElementById('moduleTitle');
const moduleStatus = document.getElementById('moduleStatus');
const moduleGrid = document.getElementById('moduleGrid');
const signalValue = document.getElementById('signalValue');
const signalBar = document.getElementById('signalBar');
const footerLeft = document.getElementById('footerLeft');
const footerRight = document.getElementById('footerRight');
const caseSearch = document.getElementById('caseSearch');
const caseFilter = document.getElementById('caseFilter');
const caseList = document.getElementById('caseList');
const routeList = document.getElementById('routeList');
const modeToggle = document.getElementById('modeToggle');
const secondsToggle = document.getElementById('secondsToggle');
const scanToggle = document.getElementById('scanToggle');
const latency = document.getElementById('latency');
const patrolCount = document.getElementById('patrolCount');
const phase = document.getElementById('phase');

const MENU_ITEMS = [
  { id: 'clock', icon: 'CLK', label: 'Clock Grid', description: 'Live city chrono matrix', stat: 'live' },
  { id: 'cases', icon: 'CAS', label: 'Caseboard', description: 'Filter active investigations', stat: '6 files' },
  { id: 'transit', icon: 'TRN', label: 'Transit', description: 'Monitor elevated routes', stat: '3 lines' },
  { id: 'arsenal', icon: 'ARS', label: 'Arsenal', description: 'Calibrate field equipment', stat: '12 kits' },
  { id: 'bloom', icon: 'BLM', label: 'Signal Bloom', description: 'Color anomaly visualizer', stat: 'rare', colorful: true },
  { id: 'archive', icon: 'ARC', label: 'Archive', description: 'Review sealed intelligence', stat: '28 logs' }
];

const MODULE_DATA = {
  arsenal: {
    status: '12 kits',
    title: 'Arsenal Calibration',
    footer: 'Equipment matrix is stable',
    cards: [
      ['Grapnel', 'Ready', 'Motor tension and line spool are within range.'],
      ['Cowl Link', 'Encrypted', 'Short-range relay handshake is rotating cleanly.'],
      ['Field Scanner', 'Charging', 'Spectral lens pack reaches full charge in 18 minutes.']
    ]
  },
  bloom: {
    status: 'rare signal',
    title: 'Signal Bloom',
    footer: 'One colorful module is intentionally isolated',
    cards: [
      ['Prism Sweep', 'Active', 'A bright anomaly is mapped without changing the rest of the terminal tone.'],
      ['Spectrum', 'Violet / Cyan', 'Color is limited to this module so the interface still feels disciplined.'],
      ['Pulse', 'Dynamic', 'Canvas bloom reacts as a soft atmospheric layer behind the panels.']
    ]
  },
  archive: {
    status: '28 logs',
    title: 'Archive Vault',
    footer: 'Archived intelligence is indexed',
    cards: [
      ['Cold Files', '11', 'Dormant leads sorted by district and date.'],
      ['Recovered Audio', '09', 'Noise-reduced transmissions awaiting review.'],
      ['Sealed Notes', '08', 'Restricted entries remain locked to read-only mode.']
    ]
  }
};

const CASES = [
  { title: 'Narrows Relay', text: 'Signal bounces through three rooftop repeaters.', status: 'open', district: 'Narrows', heat: 84 },
  { title: 'Founders Gala', text: 'Guest list anomaly detected near service entrance.', status: 'watch', district: 'Old Gotham', heat: 42 },
  { title: 'Blackgate Ferry', text: 'Harbor route paused after duplicate beacon ping.', status: 'critical', district: 'Harbor', heat: 91 },
  { title: 'Monarch Theater', text: 'Archived camera frame recovered and enhanced.', status: 'open', district: 'Theater Row', heat: 63 },
  { title: 'East End Grid', text: 'Power draw spikes across four adjacent blocks.', status: 'watch', district: 'East End', heat: 55 },
  { title: 'Arkham Spur', text: 'Transit sensor reports a ghost carriage loop.', status: 'critical', district: 'North Line', heat: 88 }
];

const ROUTES = [
  { name: 'Blue Line', eta: '02 min', detail: 'Founders to Harbor via Kane Station' },
  { name: 'Gold Loop', eta: '07 min', detail: 'Old Gotham perimeter service' },
  { name: 'Green Spur', eta: '11 min', detail: 'East End express bypass active' }
];

let activeView = 'clock';
let activeFilter = 'all';
let W = 0, H = 0;
let gridShift = 0;
let vignette;
let slots = [];
let lastSec = -1;
let pulse = 0;
let use24Hour = true;
let showSeconds = true;
let scanEnabled = true;
const DEPTH = 8;
const FONT_STACK = "'Arial Black','Inter',sans-serif";
const WDAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
let dateStr = '';

function rand(n = 1) { return Math.random() * n; }

class Voxel {
  constructor(tone) {
    this.tone = tone;
    this.x = W * 0.5 + (Math.random() - 0.5) * W * 0.2;
    this.y = H * 0.5 + (Math.random() - 0.5) * H * 0.2;
    this.z = rand(DEPTH);
    this.tx = this.x;
    this.ty = this.y;
    this.tz = this.z;
    this.vx = 0;
    this.vy = 0;
    this.vz = 0;
  }

  burst() {
    this.vx += (Math.random() - 0.5) * 14;
    this.vy += (Math.random() - 0.5) * 14;
    this.vz += (Math.random() - 0.5) * 4;
  }

  setTarget(x, y, z) { this.tx = x; this.ty = y; this.tz = z; }

  update() {
    this.vx = this.vx * 0.73 + (this.tx - this.x) * 0.22;
    this.vy = this.vy * 0.73 + (this.ty - this.y) * 0.22;
    this.vz = this.vz * 0.72 + (this.tz - this.z) * 0.18;
    this.x += this.vx;
    this.y += this.vy;
    this.z += this.vz;
  }

  draw(cell, pulseAmount) {
    const z = this.z;
    const px = this.x + z * 0.85;
    const py = this.y - z * 0.9;
    const size = cell * 0.72;
    const light = 58 + z * 2.2 + pulseAmount * 4.4;
    const sat = 16 + this.tone * 9;
    ctx.globalAlpha = 0.56;
    ctx.fillStyle = `hsl(212, ${sat}%, ${Math.min(82, light + 12)}%)`;
    ctx.beginPath();
    ctx.moveTo(px, py - size * 0.5);
    ctx.lineTo(px + size * 0.44, py - size * 0.26);
    ctx.lineTo(px, py);
    ctx.lineTo(px - size * 0.44, py - size * 0.26);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.82;
    ctx.fillStyle = `hsl(214, ${sat}%, ${Math.min(74, light)}%)`;
    ctx.beginPath();
    ctx.moveTo(px - size * 0.44, py - size * 0.26);
    ctx.lineTo(px, py);
    ctx.lineTo(px, py + size * 0.52);
    ctx.lineTo(px - size * 0.44, py + size * 0.26);
    ctx.closePath();
    ctx.fill();
    ctx.globalAlpha = 0.77;
    ctx.fillStyle = `hsl(221, ${sat}%, ${Math.max(24, light - 18)}%)`;
    ctx.beginPath();
    ctx.moveTo(px + size * 0.44, py - size * 0.26);
    ctx.lineTo(px, py);
    ctx.lineTo(px, py + size * 0.52);
    ctx.lineTo(px + size * 0.44, py + size * 0.26);
    ctx.closePath();
    ctx.fill();
  }
}

class Slot {
  constructor(cx, cy, size, capacity, isColon = false) {
    this.cx = cx;
    this.cy = cy;
    this.fontSize = size;
    this.capacity = capacity;
    this.isColon = isColon;
    this.current = null;
    this.voxels = Array.from({ length: capacity }, (_, i) => new Voxel((i % 4) / 4));
    this.cell = Math.max(6, Math.floor(size / 11));
  }

  sampleChar(ch) {
    const fs = this.fontSize;
    const cw = Math.ceil(fs * (this.isColon ? 0.48 : 0.84)) + 36;
    const chh = Math.ceil(fs * 1.36) + 36;
    const off = document.createElement('canvas');
    off.width = cw;
    off.height = chh;
    const octx = off.getContext('2d');
    octx.fillStyle = '#fff';
    octx.font = `900 ${fs}px ${FONT_STACK}`;
    octx.textAlign = 'center';
    octx.textBaseline = 'middle';
    octx.fillText(ch, cw / 2, chh / 2);
    const data = octx.getImageData(0, 0, cw, chh).data;
    const pts = [];
    const step = this.cell;
    for (let y = 0; y < chh; y += step) {
      for (let x = 0; x < cw; x += step) {
        const a = data[(y * cw + x) * 4 + 3];
        if (a > 120) pts.push({ x: this.cx + x - cw / 2, y: this.cy + y - chh / 2, z: Math.floor(((y / chh) * DEPTH + rand(1.2))) });
      }
    }
    return pts;
  }

  setChar(ch) {
    if (ch === this.current) return;
    this.current = ch;
    const points = this.sampleChar(ch);
    if (!points.length) return;
    for (const voxel of this.voxels) voxel.burst();
    for (let i = 0; i < this.voxels.length; i++) {
      const p = points[i % points.length];
      this.voxels[i].setTarget(p.x, p.y, p.z);
    }
  }

  update() { for (const voxel of this.voxels) voxel.update(); }
  draw(pulseAmount) { for (const voxel of this.voxels.slice().sort((a, b) => a.z - b.z)) voxel.draw(this.cell, pulseAmount); }
}

function renderMenu() {
  menu.innerHTML = '';
  for (const item of MENU_ITEMS) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.classList.toggle('is-color', !!item.colorful);
    btn.innerHTML = `
      <span class="menu__icon">${item.icon}</span>
      <span><span class="menu__label">${item.label}</span><span class="menu__desc">${item.description}</span></span>
      <span class="menu__stat">${item.stat}</span>
    `;
    if (item.id === activeView) btn.classList.add('is-active');
    btn.addEventListener('click', () => setView(item.id));
    menu.appendChild(btn);
  }
}

function setView(viewId) {
  activeView = viewId;
  renderMenu();
  const isModule = ['arsenal', 'bloom', 'archive'].includes(activeView);
  clockPanel.classList.toggle('is-hidden', activeView !== 'clock');
  caseDock.classList.toggle('is-hidden', activeView !== 'cases');
  transitDock.classList.toggle('is-hidden', activeView !== 'transit');
  moduleDock.classList.toggle('is-hidden', !isModule);
  moduleDock.classList.toggle('is-bloom', activeView === 'bloom');
  if (isModule) renderModule(activeView);
  const current = MENU_ITEMS.find(item => item.id === activeView);
  footerLeft.textContent = current.label;
  footerRight.textContent = isModule ? MODULE_DATA[activeView].footer : activeView === 'clock' ? 'Use controls to change clock behavior' : activeView === 'cases' ? 'Search and filter active files' : 'Live routes rendered on terminal map';
}

function renderModule(id) {
  const data = MODULE_DATA[id];
  moduleTitle.textContent = data.title;
  moduleStatus.textContent = data.status;
  moduleGrid.innerHTML = data.cards.map(card => `
    <article class="module-card">
      <span>${card[1]}</span>
      <strong>${card[0]}</strong>
      <p>${card[2]}</p>
    </article>
  `).join('');
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  buildClock();
  buildVignette();
}

function drawGrid() {
  const major = Math.max(38, Math.floor(Math.min(W, H) / 18));
  const minor = Math.floor(major / 2);
  ctx.globalAlpha = 0.24;
  ctx.strokeStyle = 'rgba(125, 148, 188, 0.18)';
  ctx.lineWidth = 1;
  for (let x = (gridShift % major) - major; x < W + major; x += major) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = (gridShift * 0.58 % major) - major; y < H + major; y += major) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  ctx.globalAlpha = 0.09;
  ctx.strokeStyle = 'rgba(165, 186, 220, 0.16)';
  for (let x = (gridShift % minor) - minor; x < W + minor; x += minor) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = (gridShift * 0.48 % minor) - minor; y < H + minor; y += minor) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
}

function buildVignette() {
  vignette = ctx.createRadialGradient(W / 2, H / 2, H * 0.13, W / 2, H / 2, H * 0.82);
  vignette.addColorStop(0, 'rgba(8,11,19,0.02)');
  vignette.addColorStop(1, 'rgba(4,5,9,0.9)');
}

function drawVignette() { ctx.globalAlpha = 1; ctx.fillStyle = vignette; ctx.fillRect(0, 0, W, H); }

function drawScanline() {
  if (!scanEnabled) return;
  const y = (performance.now() * 0.035) % (H + 80) - 40;
  const g = ctx.createLinearGradient(0, y - 22, 0, y + 22);
  g.addColorStop(0, 'rgba(183,213,255,0)');
  g.addColorStop(0.5, activeView === 'bloom' ? 'rgba(255,141,196,0.16)' : 'rgba(183,213,255,0.12)');
  g.addColorStop(1, 'rgba(183,213,255,0)');
  ctx.globalAlpha = 1;
  ctx.fillStyle = g;
  ctx.fillRect(0, y - 22, W, 44);
}

function drawLabels() {
  if (!slots.length) return;
  const fs = slots[0].fontSize;
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.82;
  ctx.fillStyle = 'rgba(206,219,241,0.9)';
  ctx.font = `600 ${Math.max(12, fs * 0.1)}px Inter, 'Segoe UI', sans-serif`;
  ctx.fillText(dateStr, W / 2, H / 2 + fs * 0.77);
  ctx.globalAlpha = 0.34;
  ctx.fillStyle = 'rgba(158,176,208,0.9)';
  ctx.font = `500 ${Math.max(10, fs * 0.072)}px "Orbitron", "Eurostile", sans-serif`;
  ctx.fillText('GOTHAM GRID TERMINAL', W / 2, H / 2 - fs * 0.87);
}

function drawCaseView() {
  drawRings('CASEBOARD ACTIVE', 'Filter the dock below to isolate current district signals.', 'rgba(183,213,255,0.9)');
}

function drawTransitView() {
  ctx.textAlign = 'center';
  const cx = W / 2;
  const cy = H * 0.42;
  ctx.globalAlpha = 0.4;
  ctx.strokeStyle = 'rgba(183,213,255,0.55)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 7; i++) {
    const x = cx - 280 + i * 92;
    ctx.beginPath();
    ctx.moveTo(x, cy - 120);
    ctx.lineTo(x + 82, cy + 120);
    ctx.stroke();
  }
  drawCenterTitle('TRANSIT MONITOR', 'Route pulses and arrival windows are updating live.', cy);
}

function drawModuleView() {
  const item = MENU_ITEMS.find(menuItem => menuItem.id === activeView);
  if (activeView === 'bloom') {
    const cx = W / 2;
    const cy = H * 0.42;
    for (let i = 0; i < 42; i++) {
      const angle = i * 0.82 + performance.now() * 0.0007;
      const radius = 70 + (i % 7) * 27 + Math.sin(performance.now() * 0.001 + i) * 10;
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = `hsl(${(i * 31 + performance.now() * 0.03) % 360}, 88%, 68%)`;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(angle) * radius, cy + Math.sin(angle) * radius * 0.5, 3 + (i % 4), 0, Math.PI * 2);
      ctx.fill();
    }
    drawCenterTitle('SIGNAL BLOOM', 'A single color anomaly is allowed through the interface.', cy);
    return;
  }
  drawRings(item.label.toUpperCase(), item.description, 'rgba(183,213,255,0.78)');
}

function drawRings(title, subtitle, color) {
  const cx = W / 2;
  const cy = H * 0.43;
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.16;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, 70 + i * 34 + Math.sin(performance.now() * 0.001 + i) * 5, 0, Math.PI * 2);
    ctx.stroke();
  }
  drawCenterTitle(title, subtitle, cy);
}

function drawCenterTitle(title, subtitle, cy) {
  ctx.textAlign = 'center';
  ctx.globalAlpha = 0.82;
  ctx.fillStyle = 'rgba(221,233,252,0.92)';
  ctx.font = `700 ${Math.max(28, Math.min(W, H) * 0.06)}px "Orbitron", "Eurostile", sans-serif`;
  ctx.fillText(title, W / 2, cy - 10);
  ctx.globalAlpha = 0.54;
  ctx.font = `500 ${Math.max(12, Math.min(W, H) * 0.018)}px Inter, sans-serif`;
  ctx.fillText(subtitle, W / 2, cy + 34);
}

function buildClock() {
  const baseSlots = showSeconds ? 8 : 5;
  const fs = showSeconds ? Math.min(H * 0.29, W / 8.2) : Math.min(H * 0.31, W / 5.3);
  const charW = fs * 0.7;
  const colonW = fs * 0.36;
  const gap = fs * 0.07;
  const total = showSeconds ? charW * 6 + colonW * 2 + gap * 7 : charW * 4 + colonW + gap * 4;
  let x = (W - total) / 2;
  const cy = H / 2;
  const layout = [];
  for (let i = 0; i < baseSlots; i++) {
    const isColon = showSeconds ? (i === 2 || i === 5) : i === 2;
    const w = isColon ? colonW : charW;
    layout.push({ w, cap: isColon ? 56 : 210, colon: isColon });
  }
  slots = layout.map(item => {
    const s = new Slot(x + item.w / 2, cy, fs, item.cap, item.colon);
    x += item.w + gap;
    return s;
  });
  lastSec = -1;
}

function tickClock() {
  const now = new Date();
  const sec = now.getSeconds();
  if (sec === lastSec) return;
  pulse = 1;
  lastSec = sec;
  const pad = n => String(n).padStart(2, '0');
  let hour = now.getHours();
  const suffix = use24Hour ? '' : (hour >= 12 ? ' PM' : ' AM');
  if (!use24Hour) hour = hour % 12 || 12;
  const hh = pad(hour);
  const mm = pad(now.getMinutes());
  const ss = pad(sec);
  const chars = showSeconds ? [hh[0], hh[1], ':', mm[0], mm[1], ':', ss[0], ss[1]] : [hh[0], hh[1], ':', mm[0], mm[1]];
  for (let i = 0; i < slots.length; i++) slots[i].setChar(chars[i]);
  dateStr = `${WDAYS[now.getDay()]} / ${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}${suffix}`;
  phase.textContent = now.getHours() > 6 && now.getHours() < 18 ? 'Day' : 'Night';
}

function drawClockView() {
  tickClock();
  for (const slot of slots) {
    slot.update();
    slot.draw(pulse);
  }
  drawLabels();
}

function renderCases() {
  const q = caseSearch.value.trim().toLowerCase();
  const cases = CASES.filter(item => {
    const matchesFilter = activeFilter === 'all' || item.status === activeFilter;
    const matchesSearch = !q || [item.title, item.text, item.district, item.status].join(' ').toLowerCase().includes(q);
    return matchesFilter && matchesSearch;
  });
  caseList.innerHTML = cases.map(item => `
    <article class="case-card">
      <strong>${item.title}</strong>
      <p>${item.text}</p>
      <div class="case-meta">
        <span class="status-${item.status}">${item.status}</span>
        <span>${item.district}</span>
        <span>${item.heat}%</span>
      </div>
    </article>
  `).join('');
}

function renderFilters() {
  const filters = ['all', 'open', 'watch', 'critical'];
  caseFilter.innerHTML = '';
  for (const filter of filters) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = filter;
    btn.classList.toggle('is-active', filter === activeFilter);
    btn.addEventListener('click', () => {
      activeFilter = filter;
      renderFilters();
      renderCases();
    });
    caseFilter.appendChild(btn);
  }
}

function renderRoutes() {
  routeList.innerHTML = ROUTES.map(route => `
    <article class="route">
      <strong><span>${route.name}</span><span>${route.eta}</span></strong>
      <span>${route.detail}</span>
    </article>
  `).join('');
}

function updateReadouts() {
  const value = 64 + Math.round((Math.sin(performance.now() * 0.0008) + 1) * 14);
  signalValue.textContent = `${value}%`;
  signalBar.style.width = `${value}%`;
  latency.textContent = `${10 + Math.round((Math.sin(performance.now() * 0.0014) + 1) * 8)}ms`;
  patrolCount.textContent = String(6 + Math.round((Math.sin(performance.now() * 0.00055) + 1) * 2)).padStart(2, '0');
}

function loop() {
  gridShift += 0.13;
  pulse = Math.max(0, pulse - 0.03);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#070b12';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  ctx.save();
  if (activeView === 'clock') drawClockView();
  if (activeView === 'cases') drawCaseView();
  if (activeView === 'transit') drawTransitView();
  if (['arsenal', 'bloom', 'archive'].includes(activeView)) drawModuleView();
  ctx.restore();
  drawScanline();
  drawVignette();
  updateReadouts();
  requestAnimationFrame(loop);
}

modeToggle.addEventListener('click', () => {
  use24Hour = !use24Hour;
  modeToggle.textContent = use24Hour ? '24 Hour' : '12 Hour';
  modeToggle.classList.toggle('is-active', !use24Hour);
  lastSec = -1;
});

secondsToggle.addEventListener('click', () => {
  showSeconds = !showSeconds;
  secondsToggle.classList.toggle('is-active', showSeconds);
  buildClock();
});

scanToggle.addEventListener('click', () => {
  scanEnabled = !scanEnabled;
  scanToggle.classList.toggle('is-active', scanEnabled);
});

caseSearch.addEventListener('input', renderCases);
window.addEventListener('resize', resize);
renderMenu();
renderFilters();
renderCases();
renderRoutes();
setView(activeView);
resize();
tickClock();
loop();
</script>
</body>
</html>
